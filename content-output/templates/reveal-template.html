<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{title}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/{theme}.css">
  <style>
    .reveal section figure {{
      text-align: center;
    }}
    .reveal section figcaption {{
      font-size: 0.7em;
      color: #6b7280;
      margin-top: 8px;
    }}
    .reveal section svg {{
      max-width: 80%;
      max-height: 60vh;
    }}
    .reveal section pre {{
      font-size: 0.55em;
      width: 100%;
    }}
    .reveal section code {{
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
    }}
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">
      {slides}
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
  <script>
    Reveal.initialize({{
      hash: true,
      slideNumber: true,
      transition: 'slide',
      width: 1200,
      height: 800,
      margin: 0.04,
    }});
  </script>
</body>
</html>
