<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1A1A2E; width: 1080px; height: 1920px; overflow: hidden; font-family: 'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif; }
  #canvas { display: block; width: 1080px; height: 1920px; }
</style>
</head>
<body>
<canvas id="canvas" width="2160" height="3840"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 2160, H = 3840, S = 2;

const THEMES = {
  dark: {
    bg1:'#0F0F23',bg2:'#1A1A2E',bg3:'#16213E',
    accent:'#E94560',accentGlow:'rgba(233,69,96,0.15)',
    gold:'#F0C27F',goldDim:'rgba(240,194,127,0.3)',
    cyan:'#00D2FF',cyanDim:'rgba(0,210,255,0.15)',
    white:'#F0F0F0',whiteDim:'rgba(240,240,240,0.6)',
    muted:'#7A7A9E',
    cardBg:'rgba(255,255,255,0.04)',cardBorder:'rgba(255,255,255,0.08)',
    success:'#4ECDC4',warn:'#FFE66D',
  },
  warm: {
    bg1:'#FDF6EC',bg2:'#FAF0E1',bg3:'#F5E6D0',
    accent:'#D4763A',accentGlow:'rgba(212,118,58,0.12)',
    gold:'#8B5E3C',goldDim:'rgba(139,94,60,0.25)',
    cyan:'#5B8C5A',cyanDim:'rgba(91,140,90,0.12)',
    white:'#3C2415',whiteDim:'rgba(60,36,21,0.6)',
    muted:'#8B7355',
    cardBg:'rgba(255,255,255,0.7)',cardBorder:'rgba(139,94,60,0.12)',
    success:'#5B8C5A',warn:'#D4763A',
  },
  minimal: {
    bg1:'#FFFFFF',bg2:'#FAFAFA',bg3:'#F5F5F5',
    accent:'#333333',accentGlow:'rgba(51,51,51,0.08)',
    gold:'#666666',goldDim:'rgba(102,102,102,0.2)',
    cyan:'#888888',cyanDim:'rgba(136,136,136,0.1)',
    white:'#111111',whiteDim:'rgba(17,17,17,0.6)',
    muted:'#999999',
    cardBg:'rgba(0,0,0,0.02)',cardBorder:'rgba(0,0,0,0.06)',
    success:'#2D8C3C',warn:'#CC8800',
  },
  nature: {
    bg1:'#0D1F0D',bg2:'#142814',bg3:'#1A331A',
    accent:'#C9A84C',accentGlow:'rgba(201,168,76,0.12)',
    gold:'#8FAA6B',goldDim:'rgba(143,170,107,0.25)',
    cyan:'#6BA3A0',cyanDim:'rgba(107,163,160,0.12)',
    white:'#E8E4D8',whiteDim:'rgba(232,228,216,0.6)',
    muted:'#7A8B6A',
    cardBg:'rgba(255,255,255,0.04)',cardBorder:'rgba(201,168,76,0.1)',
    success:'#8FAA6B',warn:'#C9A84C',
  },
};
let C = THEMES.dark;

const F = {
  hero:`800 ${100*S}px 'PingFang SC','Microsoft YaHei',sans-serif`,
  title:`bold ${72*S}px 'PingFang SC','Microsoft YaHei',sans-serif`,
  subtitle:`${48*S}px 'PingFang SC','Microsoft YaHei',sans-serif`,
  body:`${52*S}px 'PingFang SC','Microsoft YaHei',sans-serif`,
  bodyBold:`bold ${52*S}px 'PingFang SC','Microsoft YaHei',sans-serif`,
  small:`${40*S}px 'PingFang SC','Microsoft YaHei',sans-serif`,
  quote:`bold ${80*S}px 'PingFang SC','Microsoft YaHei',sans-serif`,
  source:`${40*S}px 'PingFang SC','Microsoft YaHei',sans-serif`,
  bigNum:`800 ${160*S}px 'PingFang SC','Microsoft YaHei',sans-serif`,
  stepNum:`bold ${48*S}px 'PingFang SC','Microsoft YaHei',sans-serif`,
  slideNum:`${32*S}px 'PingFang SC','Microsoft YaHei',sans-serif`,
  label:`bold ${36*S}px 'PingFang SC','Microsoft YaHei',sans-serif`,
  statNum:`800 ${240*S}px 'PingFang SC','Microsoft YaHei',sans-serif`,
  statLabel:`${44*S}px 'PingFang SC','Microsoft YaHei',sans-serif`,
  yearNum:`bold ${56*S}px 'PingFang SC','Microsoft YaHei',sans-serif`,
};

function applyEasing(t, type) {
  if (t <= 0) return 0; if (t >= 1) return 1;
  switch (type) {
    case 'expoOut': return 1 - Math.pow(2, -10 * t);
    case 'expoInOut': return t < 0.5 ? Math.pow(2, 20*t-10)/2 : (2 - Math.pow(2, -20*t+10))/2;
    case 'easeOut': return 1 - Math.pow(1 - t, 3);
    case 'easeOutBack': { const c=1.7; return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2); }
    case 'overshoot': { const c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); }
    case 'anticipation': { if(t<0.2)return -0.3*(t/0.2)*(t/0.2); const a=(t-0.2)/0.8; return -0.012+1.012*a*a*(3-2*a); }
    case 'spring': { const c=(2*Math.PI)/3; return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*c)+1; }
    case 'easeIn': return t*t*t;
    case 'linear': return t;
    case 'none': default: return t >= 1 ? 1 : 0;
  }
}

class Sprite {
  constructor(id, enterAt, exitAt, easing, idle) {
    this.id = id; this.enterAt = enterAt; this.exitAt = exitAt;
    this.easing = easing || 'expoOut'; this.idle = idle || 'none';
    this.progress = 0; this.exitProgress = 0; this.visible = false; this.localTime = 0;
  }
  update(time, duration) {
    const enterP = (time - this.enterAt) / Math.max(0.01, 0.5);
    this.progress = applyEasing(Math.max(0, Math.min(1, enterP)), this.easing);
    if (this.exitAt != null && this.exitAt < duration) {
      const exitP = (time - this.exitAt) / Math.max(0.01, 0.4);
      this.exitProgress = applyEasing(Math.max(0, Math.min(1, exitP)), 'easeIn');
    } else { this.exitProgress = 0; }
    this.visible = time >= this.enterAt && (this.exitAt == null || time < this.exitAt + 0.5);
    this.localTime = Math.max(0, time - this.enterAt);
  }
  idleAlpha() { return this.idle === 'glow' ? 0.85 + Math.sin(this.localTime * 2) * 0.15 : 1; }
  idleScale() {
    switch(this.idle) {
      case 'breathe': return 1 + Math.sin(this.localTime * 2) * 0.02;
      case 'pulse': return 1 + Math.sin(this.localTime * 3) * 0.04;
      default: return 1;
    }
  }
  idleY() { return this.idle === 'float' ? Math.sin(this.localTime * 1.5) * 8 * S : 0; }
}

function buildSprites(slide) {
  const tl = slide.timeline;
  if (!tl || !tl.elements) return null;
  const sprites = {};
  tl.elements.forEach(el => { sprites[el.id] = new Sprite(el.id, el.enter_at, el.exit_at, el.easing, el.idle); });
  return sprites;
}

function sp(sprites, id) {
  if (!sprites || !sprites[id]) return { progress: 1, exitProgress: 0, visible: true, idleAlpha:()=>1, idleScale:()=>1, idleY:()=>0 };
  return sprites[id];
}

function withSprite(sprites, id, fn) {
  const s = sp(sprites, id);
  if (!s.visible) return s;
  ctx.save();
  ctx.globalAlpha = s.progress * (1 - s.exitProgress) * s.idleAlpha();
  const sc = s.idleScale();
  if (sc !== 1) { ctx.translate(W/2, H/2); ctx.scale(sc, sc); ctx.translate(-W/2, -H/2); }
  const oy = s.idleY();
  if (oy) ctx.translate(0, oy);
  fn(s);
  ctx.restore();
  return s;
}

function alpha(color, a) {
  if (color.startsWith('rgba')) return color.replace(/[\d.]+\)$/, a + ')');
  if (color.startsWith('rgb')) return color.replace('rgb', 'rgba').replace(')', ',' + a + ')');
  if (color.startsWith('#') && color.length === 7) {
    const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }
  return color;
}

function clearCanvas() {
  ctx.fillStyle = C.bg2; ctx.fillRect(-W*0.1, -H*0.1, W*1.2, H*1.2);
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, C.bg1); g.addColorStop(0.5, C.bg2); g.addColorStop(1, C.bg3);
  ctx.fillStyle = g; ctx.fillRect(-W*0.1, -H*0.1, W*1.2, H*1.2);
}

function drawRRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawGlassCard(x, y, w, h, opts = {}) {
  ctx.save();
  if (opts.glow) { ctx.shadowColor = opts.glow; ctx.shadowBlur = 60 * S; }
  ctx.fillStyle = opts.fill || C.cardBg;
  drawRRect(x, y, w, h, opts.r || 32*S); ctx.fill();
  ctx.strokeStyle = opts.border || C.cardBorder; ctx.lineWidth = 2 * S;
  drawRRect(x, y, w, h, opts.r || 32*S); ctx.stroke();
  ctx.restore();
}

function wrapText(text, x, y, maxW, lh) {
  const chars = text.split(''); let line = '', curY = y; const lines = [];
  for (let i = 0; i < chars.length; i++) {
    const test = line + chars[i];
    if (ctx.measureText(test).width > maxW && line.length > 0) {
      lines.push({text:line, x, y:curY}); line = chars[i]; curY += lh;
    } else { line = test; }
  }
  if (line) lines.push({text:line, x, y:curY});
  return lines;
}

function drawText(text, x, y, maxW, opts = {}) {
  const { font = F.body, color = C.white, align = 'left', lh = 70*S, maxLen = 0, maxY = 0 } = opts;
  ctx.fillStyle = color; ctx.font = font; ctx.textAlign = align;
  const display = maxLen && text.length > maxLen ? text.substring(0, maxLen) + '...' : text;
  const lines = wrapText(display, 0, 0, maxW, lh);
  const limit = maxY > 0 ? Math.max(1, Math.floor((maxY - y) / lh)) : lines.length;
  lines.slice(0, limit).forEach((line, i) => {
    const isLast = i === limit - 1;
    const txt = (limit < lines.length && isLast) ? line.text + '...' : line.text;
    ctx.fillText(txt, x, y + i * lh);
  });
  return Math.min(lines.length, limit);
}

function drawCircle(x, y, r, fill, stroke) {
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2 * S; ctx.stroke(); }
}

function drawRing(x, y, r, progress, color, width) {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = width;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke();
  ctx.strokeStyle = color; ctx.lineWidth = width; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(x, y, r, -Math.PI/2, -Math.PI/2 + Math.PI*2*progress); ctx.stroke();
  ctx.restore();
}

function drawBgCircles(progress) {
  ctx.save(); ctx.globalAlpha = 0.03;
  const t = progress * Math.PI * 2;
  for (let i = 0; i < 5; i++) {
    const cx = W*0.5 + Math.cos(t+i*1.2)*W*0.3, cy = H*0.5 + Math.sin(t+i*0.8)*H*0.3, r = (200+i*80)*S;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.strokeStyle = i%2===0 ? C.accent : C.cyan; ctx.lineWidth = 2*S; ctx.stroke();
  }
  ctx.restore();
}

function drawGrid() {
  ctx.save(); ctx.globalAlpha = 0.02; ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 1;
  const gap = 120 * S;
  for (let x = 0; x < W; x += gap) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += gap) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.restore();
}

function drawDots() {
  ctx.save(); ctx.globalAlpha = 0.03; ctx.fillStyle = C.muted;
  const gap = 80 * S;
  for (let x = gap; x < W; x += gap) for (let y = gap; y < H; y += gap) {
    ctx.beginPath(); ctx.arc(x, y, 3*S, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawSlideCounter(current, total) {
  ctx.fillStyle = C.muted; ctx.font = F.slideNum; ctx.textAlign = 'center';
  ctx.fillText(`${current} / ${total}`, W/2, H - 60*S);
}

function drawProgressLine(progress) {
  const y = H - 24*S, x1 = 120*S, x2 = W - 120*S, w = x2 - x1;
  ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fillRect(x1, y, w, 4*S);
  const g = ctx.createLinearGradient(x1, y, x1 + w*progress, y);
  g.addColorStop(0, C.accent); g.addColorStop(1, C.gold);
  ctx.fillStyle = g; ctx.fillRect(x1, y, w*progress, 4*S);
}

function drawAccentLine(x, y, w) {
  const g = ctx.createLinearGradient(x, y, x+w, y);
  g.addColorStop(0, C.accent); g.addColorStop(0.5, C.gold); g.addColorStop(1, 'transparent');
  ctx.fillStyle = g; ctx.fillRect(x, y, w, 4*S);
}

function drawBigNumber(num, x, y, color) {
  ctx.save(); ctx.fillStyle = color || C.accent; ctx.font = F.bigNum; ctx.textAlign = 'center';
  ctx.globalAlpha = 0.12; ctx.fillText(num, x, y); ctx.restore();
}

function drawIcon(type, x, y, size, color) {
  ctx.save(); ctx.strokeStyle = color || C.accent; ctx.fillStyle = color || C.accent;
  ctx.lineWidth = 4*S; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  const s = size;
  switch (type) {
    case 'brain':
      ctx.beginPath(); ctx.arc(x-s*0.15,y-s*0.08,s*0.28,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(x+s*0.15,y-s*0.08,s*0.28,0,Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x-s*0.08,y-s*0.36); ctx.quadraticCurveTo(x,y-s*0.18,x+s*0.08,y-s*0.36); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x-s*0.22,y+s*0.15); ctx.quadraticCurveTo(x,y+s*0.32,x+s*0.22,y+s*0.15); ctx.stroke();
      break;
    case 'lightbulb':
      ctx.beginPath(); ctx.arc(x,y-s*0.1,s*0.3,Math.PI*1.1,Math.PI*-0.1); ctx.lineTo(x+s*0.12,y+s*0.2); ctx.lineTo(x-s*0.12,y+s*0.2); ctx.closePath(); ctx.stroke();
      ctx.fillRect(x-s*0.1,y+s*0.24,s*0.2,s*0.06);
      break;
    case 'target':
      drawCircle(x,y,s*0.35,null,color||C.accent); drawCircle(x,y,s*0.2,null,color||C.accent); drawCircle(x,y,s*0.06,color||C.accent);
      break;
    case 'layers':
      for(let i=0;i<3;i++){const oy=y-s*0.2+i*s*0.16;ctx.beginPath();ctx.moveTo(x-s*0.28,oy);ctx.lineTo(x,oy-s*0.1);ctx.lineTo(x+s*0.28,oy);ctx.lineTo(x,oy+s*0.1);ctx.closePath();if(i===2)ctx.fill();else ctx.stroke();}
      break;
    case 'zap':
      ctx.beginPath();ctx.moveTo(x+s*0.05,y-s*0.32);ctx.lineTo(x-s*0.12,y+s*0.02);ctx.lineTo(x+s*0.02,y+s*0.02);ctx.lineTo(x-s*0.05,y+s*0.32);ctx.lineTo(x+s*0.12,y-s*0.02);ctx.lineTo(x-s*0.02,y-s*0.02);ctx.closePath();ctx.fill();
      break;
    case 'check':
      drawCircle(x,y,s*0.35,null,color||C.success);
      ctx.beginPath();ctx.moveTo(x-s*0.15,y);ctx.lineTo(x-s*0.02,y+s*0.15);ctx.lineTo(x+s*0.18,y-s*0.12);ctx.stroke();
      break;
    case 'arrow':
      ctx.beginPath();ctx.moveTo(x-s*0.2,y);ctx.lineTo(x+s*0.2,y);ctx.moveTo(x+s*0.06,y-s*0.12);ctx.lineTo(x+s*0.22,y);ctx.lineTo(x+s*0.06,y+s*0.12);ctx.stroke();
      break;
    case 'scale':
      ctx.beginPath();ctx.moveTo(x,y-s*0.28);ctx.lineTo(x,y+s*0.22);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x-s*0.28,y-s*0.12);ctx.lineTo(x,y-s*0.28);ctx.lineTo(x+s*0.28,y-s*0.12);ctx.stroke();
      drawCircle(x-s*0.22,y-s*0.02,s*0.08,null,color||C.accent);drawCircle(x+s*0.22,y-s*0.02,s*0.08,null,color||C.accent);
      break;
    case 'diamond':
      ctx.beginPath();ctx.moveTo(x,y-s*0.3);ctx.lineTo(x+s*0.2,y);ctx.lineTo(x,y+s*0.3);ctx.lineTo(x-s*0.2,y);ctx.closePath();ctx.stroke();
      drawCircle(x,y,s*0.06,color||C.accent);
      break;
    case 'hexagon':
      ctx.beginPath();for(let i=0;i<6;i++){const a=(i/6)*Math.PI*2-Math.PI/6;const px=x+Math.cos(a)*s*0.3;const py=y+Math.sin(a)*s*0.3;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}ctx.closePath();ctx.stroke();
      break;
    case 'question':
      ctx.beginPath();ctx.arc(x,y-s*0.08,s*0.25,Math.PI*0.2,Math.PI*0.8,true);ctx.stroke();
      ctx.beginPath();ctx.moveTo(x,y+s*0.17);ctx.lineTo(x,y+s*0.22);ctx.stroke();
      drawCircle(x,y+s*0.32,s*0.03,color||C.accent);
      break;
  }
  ctx.restore();
}

const VISUAL_LANG = {
  tech: {
    drawBg(t) {
      ctx.save(); ctx.globalAlpha = 0.04; ctx.strokeStyle = C.cyan; ctx.lineWidth = 1.5*S;
      for(let i=0;i<6;i++){const cx=W*0.5+Math.cos(t*0.5+i*Math.PI/3)*W*0.35,cy=H*0.4+Math.sin(t*0.3+i*Math.PI/3)*H*0.25,r=(120+i*60)*S;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();if(i<3){const cx2=W*0.5+Math.cos(t*0.5+(i+3)*Math.PI/3)*W*0.35,cy2=H*0.4+Math.sin(t*0.3+(i+3)*Math.PI/3)*H*0.25;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx2,cy2);ctx.stroke();}}
      ctx.restore();
    },
    iconSet:['brain','zap','diamond','hexagon','layers'],
    accentEasing:'expoOut', enterEasing:'spring',
  },
  edu: {
    drawBg(t) {
      ctx.save(); ctx.globalAlpha = 0.04; ctx.strokeStyle = C.gold; ctx.lineWidth = 2*S;
      const stepW=W*0.6,stepH=80*S,baseY=H*0.65;
      for(let i=0;i<5;i++){const x=W*0.2+i*(stepW/5),y=baseY-i*stepH,w=stepW/5-20*S,h=stepH-10*S;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+w,y);ctx.lineTo(x+w,y-h);ctx.stroke();if(i<4){ctx.beginPath();ctx.moveTo(x+w,y-h/2);ctx.lineTo(x+w+20*S,y-h/2);ctx.stroke();}}
      ctx.restore();
    },
    iconSet:['lightbulb','layers','check','arrow','target'],
    accentEasing:'anticipation', enterEasing:'overshoot',
  },
  compare: {
    drawBg(t) {
      ctx.save(); ctx.globalAlpha = 0.04; ctx.strokeStyle = C.accent; ctx.lineWidth = 2*S;
      ctx.setLineDash([10*S,10*S]); ctx.beginPath(); ctx.moveTo(W/2,H*0.1); ctx.lineTo(W/2,H*0.9); ctx.stroke(); ctx.setLineDash([]);
      ctx.strokeStyle = C.success; ctx.beginPath(); ctx.arc(W*0.25,H*0.5,100*S,0,Math.PI*2); ctx.stroke();
      ctx.strokeStyle = C.warn; ctx.beginPath(); ctx.arc(W*0.75,H*0.5,100*S,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    },
    iconSet:['scale','diamond','check','zap','target'],
    accentEasing:'expoOut', enterEasing:'overshoot',
  },
  philosophy: {
    drawBg(t) {
      ctx.save(); ctx.globalAlpha = 0.025; ctx.strokeStyle = C.muted; ctx.lineWidth = 1*S;
      const breath = Math.sin(t*0.8)*0.15+1;
      for(let i=0;i<3;i++){const r=(300+i*200)*S*breath;ctx.beginPath();ctx.arc(W/2,H*0.45,r,0,Math.PI*2);ctx.stroke();}
      ctx.restore();
    },
    iconSet:['diamond','lightbulb','brain','scale','layers'],
    accentEasing:'easeInOut', enterEasing:'expoOut',
  },
};

function getVisualLang() { return VISUAL_LANG[window.visualStyle] || VISUAL_LANG.tech; }
function drawVisualLangBg(t) { const vl = getVisualLang(); if (vl.drawBg) vl.drawBg(t); }
function getSceneIcon(sceneType, index) { const vl = getVisualLang(); return vl.iconSet[index % vl.iconSet.length]; }

const SCENE_TEMPLATES = {
  title:    { bg:'circles', camera:'zoomIn',  transition:'morph' },
  bullet:   { bg:'grid',    camera:'none',    transition:'slideAndFade' },
  quote:    { bg:'circles', camera:'none',    transition:'crossfade' },
  compare:  { bg:'grid',    camera:'none',    transition:'morph' },
  steps:    { bg:'dots',    camera:'panDown', transition:'slideAndFade' },
  summary:  { bg:'circles', camera:'zoomOut', transition:'crossfade' },
  stat:     { bg:'grid',    camera:'breathe', transition:'morph' },
  chart:    { bg:'grid',    camera:'none',    transition:'slideAndFade' },
  timeline: { bg:'dots',    camera:'panDown', transition:'slideAndFade' },
  focus:    { bg:'none',    camera:'zoomIn',  transition:'crossfade' },
  qa:       { bg:'grid',    camera:'none',    transition:'flip' },
};

function setupScene(type, progress, isTop) {
  if (!isTop) return;
  const tpl = SCENE_TEMPLATES[type] || SCENE_TEMPLATES.bullet;
  switch (tpl.bg) {
    case 'grid': drawGrid(); break;
    case 'circles': drawGrid(); drawBgCircles(progress); break;
    case 'dots': drawDots(); break;
  }
  drawVisualLangBg(progress);
}

function footer(progress, idx, total) {
  drawProgressLine(progress); drawSlideCounter(idx + 1, total);
}

function applyCameraMotion(type, localT, duration) {
  const t = Math.min(1, localT / Math.max(0.01, duration));
  switch (type) {
    case 'zoomIn': { const z=1+t*0.05; ctx.translate(W/2,H/2); ctx.scale(z,z); ctx.translate(-W/2,-H/2); break; }
    case 'zoomOut': { const z=1.05-t*0.05; ctx.translate(W/2,H/2); ctx.scale(z,z); ctx.translate(-W/2,-H/2); break; }
    case 'panDown': ctx.translate(0, t*50*S); break;
    case 'panUp': ctx.translate(0, -t*50*S); break;
    case 'breathe': { const z=1+Math.sin(t*Math.PI*2)*0.015; ctx.translate(W/2,H/2); ctx.scale(z,z); ctx.translate(-W/2,-H/2); break; }
  }
}

function applyTransition(type, progress, isOld) {
  const p = Math.max(0, Math.min(1, progress));
  switch (type) {
    case 'slideLeft':
      if (isOld) ctx.translate(-W*p, 0); else ctx.translate(W*(1-p), 0);
      break;
    case 'slideUp':
      if (isOld) ctx.translate(0, -H*p); else ctx.translate(0, H*(1-p));
      break;
    case 'zoomIn':
      if (isOld) { const s=1+p*0.3; ctx.translate(W/2,H/2); ctx.scale(s,s); ctx.translate(-W/2,-H/2); }
      break;
    case 'flip':
      if (isOld) ctx.scale(Math.cos(p*Math.PI), 1); else ctx.scale(Math.cos((1-p)*Math.PI), 1);
      break;
    case 'crossfade':
      break;
    case 'morph':
      if (isOld) {
        ctx.translate(W/2, H/2);
        ctx.scale(1 + p * 0.05, 1 + p * 0.05);
        ctx.translate(-W/2, -H/2);
      } else {
        ctx.translate(W/2, H/2);
        ctx.scale(1.05 - p * 0.05, 1.05 - p * 0.05);
        ctx.translate(-W/2, -H/2);
      }
      break;
    case 'slideAndFade':
      if (isOld) {
        ctx.translate(0, -p * 80 * S);
      } else {
        ctx.translate(0, (1 - p) * 80 * S);
      }
      break;
    case 'fade': default:
      break;
  }
}

function drawBarChart(x, y, w, h, data, progress) {
  const maxVal = Math.max(...data.map(d => d.value), 1);
  const barH = Math.min(80*S, (h - 40*S) / data.length - 20*S);
  const labelW = 200*S;
  const barAreaW = w - labelW - 120*S;
  data.forEach((d, i) => {
    const iy = y + i * (barH + 24*S);
    const barColor = d.color === 'accent' ? C.accent : d.color === 'cyan' ? C.cyan : d.color === 'gold' ? C.gold : C.success;
    ctx.fillStyle = C.whiteDim; ctx.font = F.small; ctx.textAlign = 'right';
    ctx.fillText(d.label, x + labelW - 20*S, iy + barH * 0.7);
    ctx.fillStyle = alpha(barColor, 0.08);
    drawRRect(x + labelW, iy, barAreaW, barH, 12*S); ctx.fill();
    const barW = (d.value / maxVal) * barAreaW * Math.min(1, progress * 1.5);
    const g = ctx.createLinearGradient(x + labelW, iy, x + labelW + barW, iy);
    g.addColorStop(0, barColor); g.addColorStop(1, alpha(barColor, 0.6));
    ctx.fillStyle = g;
    drawRRect(x + labelW, iy, Math.max(20*S, barW), barH, 12*S); ctx.fill();
    if (progress > 0.3) {
      ctx.fillStyle = C.white; ctx.font = F.bodyBold; ctx.textAlign = 'left';
      ctx.fillText(`${d.value}`, x + labelW + Math.max(20*S, barW) + 20*S, iy + barH * 0.7);
    }
  });
}

function drawDonutChart(cx, cy, r, data, progress) {
  const total = data.reduce((s, d) => s + d.value, 0) || 1;
  const colors = [C.accent, C.cyan, C.gold, C.success, C.warn];
  let angle = -Math.PI / 2;
  ctx.save(); ctx.lineWidth = 40 * S; ctx.lineCap = 'butt';
  data.forEach((d, i) => {
    const sweep = (d.value / total) * Math.PI * 2 * Math.min(1, progress * 1.2);
    ctx.strokeStyle = alpha(colors[i % colors.length], 0.15);
    ctx.beginPath(); ctx.arc(cx, cy, r, angle, angle + (d.value/total)*Math.PI*2); ctx.stroke();
    ctx.strokeStyle = colors[i % colors.length];
    ctx.beginPath(); ctx.arc(cx, cy, r, angle, angle + sweep); ctx.stroke();
    angle += (d.value / total) * Math.PI * 2;
  });
  ctx.restore();
  ctx.fillStyle = C.white; ctx.font = F.bodyBold; ctx.textAlign = 'center';
  ctx.fillText(`${total}`, cx, cy + 20*S);
  ctx.fillStyle = C.muted; ctx.font = F.small;
  ctx.fillText('总计', cx, cy + 60*S);
}

function drawProgressBar(x, y, w, h, value, max, color, progress) {
  const ratio = (value / Math.max(1, max)) * Math.min(1, progress * 1.3);
  ctx.fillStyle = alpha(color, 0.08);
  drawRRect(x, y, w, h, h/2); ctx.fill();
  const g = ctx.createLinearGradient(x, y, x + w * ratio, y);
  g.addColorStop(0, color); g.addColorStop(1, alpha(color, 0.7));
  ctx.fillStyle = g;
  drawRRect(x, y, Math.max(h, w * ratio), h, h/2); ctx.fill();
  ctx.fillStyle = C.white; ctx.font = F.bodyBold; ctx.textAlign = 'right';
  ctx.fillText(`${Math.round(ratio * 100)}%`, x + w - 10*S, y + h * 0.7);
}

function drawTimelineAxis(x, y, h, events, progress) {
  ctx.strokeStyle = alpha(C.muted, 0.2); ctx.lineWidth = 3 * S;
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + h); ctx.stroke();
  const stepH = h / Math.max(1, events.length);
  events.forEach((ev, i) => {
    const ey = y + i * stepH + stepH / 2;
    const vis = progress > (i + 0.5) / events.length;
    if (!vis) return;
    ctx.fillStyle = C.accent;
    ctx.beginPath(); ctx.arc(x, ey, 14*S, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFFFFF'; ctx.font = F.small; ctx.textAlign = 'center';
    ctx.fillText(`${i+1}`, x, ey + 14*S);
    if (ev.year) {
      ctx.fillStyle = C.gold; ctx.font = F.yearNum; ctx.textAlign = 'right';
      ctx.fillText(ev.year, x - 40*S, ey + 20*S);
    }
    ctx.fillStyle = C.white; ctx.font = F.bodyBold; ctx.textAlign = 'left';
    ctx.fillText(ev.title || '', x + 40*S, ey + 5*S);
    if (ev.desc) {
      ctx.fillStyle = C.whiteDim; ctx.font = F.small;
      ctx.fillText(ev.desc.substring(0, 25), x + 40*S, ey + 55*S);
    }
  });
}

function drawFocusMask(focusY, focusH, progress) {
  ctx.save();
  ctx.fillStyle = alpha(C.bg1, 0.7 * progress);
  ctx.fillRect(0, 0, W, focusY);
  ctx.fillRect(0, focusY + focusH, W, H - focusY - focusH);
  ctx.restore();
}

function autoTimeline(slide, slideIndex, totalSlides) {
  const dur = slide.duration || 10;
  const els = [];
  const type = slide.type;
  const push = (id, enter, exit, easing, idle) => els.push({id, enter_at:enter, exit_at:exit, easing:easing||'expoOut', idle:idle||'none'});

  push('bg', 0, dur - 0.3, 'none');
  if (type === 'title') {
    push('icon', 0.2, dur - 0.25, 'expoOut', 'pulse');
    push('title', 0.4, dur - 0.15, 'expoOut');
    push('accent', 0.7, dur - 0.1, 'expoOut');
    if (slide.subtitle) push('subtitle', 0.9, dur - 0.05, 'expoOut');
  } else if (type === 'bullet') {
    push('heading', 0.1, dur - 0.2);
    push('accent', 0.3, dur - 0.15);
    (slide.items||[]).forEach((_,i) => push(`item_${i}`, 0.4+i*0.25, dur - 0.1 + i*0.03, 'easeOutBack'));
  } else if (type === 'quote') {
    push('openQuote', 0.2, dur - 0.2);
    push('card', 0.3, dur - 0.15);
    push('text', 0.6, dur - 0.1);
    if (slide.source) push('source', 0.9, dur - 0.05);
  } else if (type === 'compare') {
    push('heading', 0.1, dur - 0.2);
    push('accent', 0.3, dur - 0.15);
    push('leftCol', 0.4, dur - 0.1);
    push('rightCol', 0.5, dur - 0.1);
    const maxI = Math.max((slide.left||[]).length, (slide.right||[]).length);
    for (let i=0;i<maxI;i++) {
      if (i < (slide.left||[]).length) push(`left_${i}`, 0.6+i*0.12, dur - 0.05 + i*0.02, 'easeOut');
      if (i < (slide.right||[]).length) push(`right_${i}`, 0.6+i*0.12, dur - 0.05 + i*0.02, 'easeOut');
    }
  } else if (type === 'steps') {
    push('heading', 0.1, dur - 0.2);
    push('accent', 0.3, dur - 0.15);
    (slide.steps||[]).forEach((_,i) => push(`step_${i}`, 0.4+i*0.3, dur - 0.1 + i*0.04, 'easeOutBack'));
  } else if (type === 'summary') {
    push('icon', 0.1, dur - 0.25, 'expoOut', 'pulse');
    push('heading', 0.2, dur - 0.2);
    push('accent', 0.4, dur - 0.15);
    (slide.items||[]).forEach((_,i) => push(`item_${i}`, 0.5+i*0.15, dur - 0.1 + i*0.03, 'easeOut'));
  } else if (type === 'stat') {
    push('ring', 0.1, dur - 0.25, 'expoOut', 'breathe');
    push('value', 0.3, dur - 0.15, 'expoOut');
    push('label', 0.6, dur - 0.1);
    if (slide.sublabel) push('sublabel', 0.8, dur - 0.05);
  } else if (type === 'chart') {
    push('heading', 0.1, dur - 0.2);
    push('accent', 0.3, dur - 0.15);
    push('chart', 0.4, dur - 0.1);
  } else if (type === 'timeline') {
    push('heading', 0.1, dur - 0.2);
    push('accent', 0.3, dur - 0.15);
    push('axis', 0.4, dur - 0.1);
  } else if (type === 'focus') {
    push('mask', 0.1, dur - 0.2);
    push('keyword', 0.3, dur - 0.15, 'expoOut');
    push('explanation', 0.6, dur - 0.1);
    push('callout', 0.8, dur - 0.05);
  } else if (type === 'qa') {
    push('question', 0.1, dur*0.45);
    push('flip', dur*0.45, dur - 0.15, 'expoOut');
    push('answer', dur*0.5, dur - 0.05);
  } else {
    push('heading', 0.1, dur - 0.15);
  }
  return { duration: dur, elements: els };
}

const RENDERERS = {};

RENDERERS.title = function(slide, progress, idx, total, sprites) {
  setupScene('title', progress, isTopScene);
  withSprite(sprites, 'icon', () => {
    drawRing(W/2, H*0.18, 180*S, sp(sprites,'icon').progress, C.accent, 6*S);
    drawIcon('brain', W/2, H*0.18, 160*S, C.accent);
  });
  withSprite(sprites, 'title', (s) => {
    const slideUp = (1-s.progress)*80*S;
    const maxTitleW = W - 240*S;
    ctx.font = F.hero;
    let titleLh = 130*S, titleFont = F.hero;
    let titleLines = wrapText(slide.title, 0, 0, maxTitleW, titleLh);
    if (titleLines.length > 2) {
      titleFont = F.title; titleLh = 100*S;
      ctx.font = titleFont;
      titleLines = wrapText(slide.title, 0, 0, maxTitleW, titleLh);
    }
    if (titleLines.length > 3) {
      titleFont = F.bodyBold; titleLh = 80*S;
      ctx.font = titleFont;
      titleLines = wrapText(slide.title, 0, 0, maxTitleW, titleLh);
    }
    const titleY = H*0.36 - (titleLines.length-1)*titleLh*0.5 + slideUp;
    ctx.fillStyle = C.white; ctx.font = titleFont; ctx.textAlign = 'center';
    titleLines.forEach((line,i) => ctx.fillText(line.text, W/2, titleY+i*titleLh));
  });
  withSprite(sprites, 'accent', () => {
    const titleLines = wrapText(slide.title, 0, 0, W-240*S, 130*S);
    drawAccentLine(W/2-160*S, H*0.36+titleLines.length*130*S+40*S, 320*S);
  });
  withSprite(sprites, 'subtitle', () => {
    if (!slide.subtitle) return;
    const titleLines = wrapText(slide.title, 0, 0, W-240*S, 130*S);
    let subY = H*0.36 + titleLines.length*130*S + 100*S;
    subY = Math.min(subY, H*0.58);
    drawText(slide.subtitle, W/2, subY, W-240*S, {font:F.small, color:C.whiteDim, align:'center', lh:60*S, maxY:H*0.72});
  });
  footer(progress, idx, total);
};

RENDERERS.quote = function(slide, progress, idx, total, sprites) {
  setupScene('quote', progress, isTopScene);
  withSprite(sprites, 'openQuote', () => {
    ctx.fillStyle = C.accent; ctx.font = `200 ${280*S}px Georgia,serif`; ctx.textAlign = 'center';
    ctx.fillText('\u201C', W/2, H*0.22);
  });
  ctx.font = F.quote; ctx.textAlign = 'center';
  const quoteMaxW = W - 480*S;
  const quoteLh = 120*S;
  const quoteLines = wrapText(slide.text, 0, 0, quoteMaxW, quoteLh);
  const srcText = slide.source ? `\u2014\u2014 ${slide.source}` : '';
  ctx.font = F.source;
  const srcLines = srcText ? wrapText(srcText, 0, 0, W-400*S, 55*S) : [];
  const textH = quoteLines.length * quoteLh;
  const srcH = srcLines.length * 55*S;
  const cardH = Math.max(H*0.28, textH + srcH + 320*S);
  const cardY = Math.max(H*0.22, H*0.5 - cardH/2);
  withSprite(sprites, 'card', () => {
    drawGlassCard(120*S, cardY, W-240*S, cardH, {glow:C.accentGlow, border:'rgba(233,69,96,0.12)'});
  });
  withSprite(sprites, 'text', () => {
    const quoteY = cardY + 140*S;
    ctx.fillStyle = C.white; ctx.font = F.quote; ctx.textAlign = 'center';
    quoteLines.forEach((line,i) => ctx.fillText(line.text, W/2, quoteY+i*quoteLh));
  });
  withSprite(sprites, 'source', () => {
    if (!slide.source) return;
    let srcY = cardY + textH + 180*S;
    const maxSrcY = cardY + cardH - 60*S - (srcLines.length-1)*55*S;
    srcY = Math.min(srcY, maxSrcY);
    drawText(srcText, W/2, srcY, W-400*S, {font:F.source, color:C.muted, align:'center', lh:55*S});

  drawRing(W/2, H*0.85, 60*S, progress, C.gold, 4*S);
  footer(progress, idx, total);
};

RENDERERS.summary = function(slide, progress, idx, total, sprites) {
  setupScene('summary', progress, isTopScene);
  withSprite(sprites, 'icon', () => {
    drawRing(W/2, H*0.1, 80*S, sp(sprites,'icon').progress, C.success, 5*S);
    drawIcon('check', W/2, H*0.1, 70*S, C.success);
  });
  withSprite(sprites, 'heading', () => {
    drawText(slide.title||'\u603B\u7ED3', W/2, H*0.2, W-200*S, {font:F.title, color:C.white, align:'center'});
  });
  withSprite(sprites, 'accent', () => drawAccentLine(W/2-140*S, H*0.2+40*S, 280*S));
  const items = slide.items||[];
  const n = items.length;
  const itemStartY = H*0.28, cardW = W-200*S, cardX = 100*S;
  const availH = H - itemStartY - 200*S;
  const maxCardH = 240*S, maxSpacing = 320*S;
  const cardH = Math.min(maxCardH, Math.max(140*S, availH / n - 40*S));
  const itemSpacing = Math.min(maxSpacing, cardH + 80*S);
  items.forEach((item, i) => {
    withSprite(sprites, `item_${i}`, () => {
      const iy = itemStartY + i*itemSpacing;
      drawGlassCard(cardX, iy, cardW, cardH, {glow:'rgba(78,205,196,0.08)', border:'rgba(78,205,196,0.15)'});
      drawCircle(cardX+100*S, iy+cardH/2, 30*S, C.success, null);
      ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 4*S; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(cardX+86*S,iy+cardH/2); ctx.lineTo(cardX+96*S,iy+cardH/2+12*S); ctx.lineTo(cardX+116*S,iy+cardH/2-10*S); ctx.stroke();
      drawText(item, cardX+180*S, iy+cardH/2, cardW-240*S, {maxLen:18, lh:Math.min(65*S, cardH*0.3), maxY:iy+cardH-10*S});
    });
  });
  footer(progress, idx, total);
};

RENDERERS.stat = function(slide, progress, idx, total, sprites) {
  setupScene('stat', progress, isTopScene);
  withSprite(sprites, 'ring', (s) => {
    drawRing(W/2, H*0.32, 260*S, s.progress, C.accent, 8*S);
    drawRing(W/2, H*0.32, 200*S, s.progress * 0.7, C.gold, 5*S);
  });
  withSprite(sprites, 'value', () => {
    ctx.fillStyle = C.white; ctx.font = F.statNum; ctx.textAlign = 'center';
    ctx.fillText(slide.value||'0', W/2, H*0.38);
  });
  withSprite(sprites, 'label', () => {
    drawText(slide.label||'', W/2, H*0.48, W-240*S, {font:F.body, color:C.whiteDim, align:'center', lh:65*S, maxY:H*0.56});
  });
  withSprite(sprites, 'sublabel', () => {
    if (!slide.sublabel) return;
    drawText(slide.sublabel, W/2, H*0.56, W-240*S, {font:F.small, color:C.muted, align:'center', lh:55*S, maxY:H*0.65});
  });
  drawIcon('zap', W/2, H*0.68, 60*S, C.goldDim);
  footer(progress, idx, total);
};

RENDERERS.chart = function(slide, progress, idx, total, sprites) {
  setupScene('chart', progress, isTopScene);
  withSprite(sprites, 'heading', () => {
    drawText(slide.title, W/2, 180*S, W-200*S, {font:F.title, color:C.white, align:'center'});
  });
  withSprite(sprites, 'accent', () => drawAccentLine(W/2-140*S, 220*S, 280*S));
  withSprite(sprites, 'chart', () => {
    const data = slide.data || [];
    const chartType = slide.chartType || 'bar';
    if (chartType === 'donut') {
      drawDonutChart(W/2, H*0.45, 220*S, data, progress);
      const legendY = H*0.65, maxLegendY = H - 200*S;
      const colors = [C.accent, C.cyan, C.gold, C.success, C.warn];
      data.forEach((d, i) => {
        const lx = 120*S + (i % 3) * (W-240*S) / 3;
        const ly = legendY + Math.floor(i/3) * 60*S;
        if (ly > maxLegendY) return;
        ctx.fillStyle = colors[i%colors.length];
        ctx.beginPath(); ctx.arc(lx+16*S, ly, 16*S, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = C.white; ctx.font = F.small; ctx.textAlign = 'left';
        ctx.fillText(d.label, lx+44*S, ly+16*S);
      });
    } else {
      drawBarChart(100*S, 400*S, W-200*S, H-600*S, data, progress);
    }
  });
  footer(progress, idx, total);
};

RENDERERS.timeline = function(slide, progress, idx, total, sprites) {
  setupScene('timeline', progress, isTopScene);
  withSprite(sprites, 'heading', () => {
    drawText(slide.title, W/2, 180*S, W-200*S, {font:F.title, color:C.white, align:'center'});
  });
  withSprite(sprites, 'accent', () => drawAccentLine(W/2-140*S, 220*S, 280*S));
  const events = slide.events||[];
  const n = events.length;
  const axisX = W*0.28, axisStartY = 360*S, axisEndY = H-400*S;
  const availH = axisEndY - axisStartY;
  const eventSpacing = Math.min(280*S, availH / Math.max(n, 1));
  withSprite(sprites, 'axis', () => {
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 3*S;
    ctx.beginPath(); ctx.moveTo(axisX, axisStartY); ctx.lineTo(axisX, axisStartY+n*eventSpacing); ctx.stroke();
    events.forEach((ev, i) => {
      const ey = axisStartY + i*eventSpacing;
      drawCircle(axisX, ey, 12*S, C.accent, null);
      if (i < n-1) {
        ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 2*S; ctx.setLineDash([6*S,4*S]);
        ctx.beginPath(); ctx.moveTo(axisX+12*S, ey); ctx.lineTo(axisX+12*S, ey+eventSpacing); ctx.stroke(); ctx.setLineDash([]);
      }
    });
  });
  events.forEach((ev, i) => {
    withSprite(sprites, `event_${i}`, () => {
      const ey = axisStartY + i*eventSpacing;
      ctx.fillStyle = C.accent; ctx.font = F.bodyBold; ctx.textAlign = 'left';
      ctx.fillText(ev.year||ev.time||`${i+1}`, axisX+40*S, ey+8*S);
      drawText(ev.event||ev.text||'', axisX+40*S, ey+60*S, W-axisX-200*S, {color:C.whiteDim, lh:55*S, maxY:ey+eventSpacing-10*S});
    });
  });
  footer(progress, idx, total);
};

RENDERERS.focus = function(slide, progress, idx, total, sprites) {
  setupScene('focus', progress, isTopScene);
  withSprite(sprites, 'mask', () => {
    drawFocusMask(H*0.3, H*0.2, sp(sprites,'mask').progress);
  });
  withSprite(sprites, 'keyword', (s) => {
    const scale = 0.8 + s.progress * 0.2;
    ctx.save();
    ctx.translate(W/2, H*0.38); ctx.scale(scale, scale); ctx.translate(-W/2, -H*0.38);
    ctx.fillStyle = C.accent; ctx.font = F.hero; ctx.textAlign = 'center';
    const kwLines = wrapText(slide.keyword||'', 0, 0, W-240*S, 130*S);
    if (kwLines.length > 1) { ctx.font = F.title; }
    kwLines.forEach((line,i) => ctx.fillText(line.text, W/2, H*0.42+i*100*S));
    ctx.restore();
    drawAccentLine(W/2-160*S, H*0.46, 320*S);
  });
  withSprite(sprites, 'explanation', () => {
    drawText(slide.explanation||'', W/2, H*0.54, W-240*S, {font:F.body, color:C.white, align:'center', lh:70*S, maxY:H*0.78});
  });
  withSprite(sprites, 'callout', () => {
    ctx.strokeStyle = C.gold; ctx.lineWidth = 2*S; ctx.setLineDash([8*S,6*S]);
    ctx.beginPath(); ctx.moveTo(W/2, H*0.48); ctx.lineTo(W/2, H*0.52); ctx.stroke(); ctx.setLineDash([]);
  });
  footer(progress, idx, total);
};

RENDERERS.qa = function(slide, progress, idx, total, sprites) {
  setupScene('qa', progress, isTopScene);
  const qMaxW = W - 320*S, qLh = 70*S;
  ctx.font = F.bodyBold;
  const qLines = wrapText(slide.question||'', 0, 0, qMaxW, qLh);
  const qCardH = Math.max(H*0.22, qLines.length*qLh + 280*S);
  const qCardY = Math.max(H*0.12, H*0.35 - qCardH/2);
  withSprite(sprites, 'question', () => {
    drawGlassCard(120*S, qCardY, W-240*S, qCardH, {glow:C.accentGlow, border:'rgba(233,69,96,0.15)'});
    drawIcon('question', W/2, qCardY+100*S, 100*S, C.accent);
    drawText(slide.question||'', W/2, qCardY+220*S, qMaxW, {font:F.bodyBold, color:C.white, align:'center', lh:qLh, maxY:qCardY+qCardH-40*S});
  });
  withSprite(sprites, 'flip', () => {
    ctx.save();
    const flipProgress = sp(sprites,'flip').progress;
    ctx.translate(W/2, H*0.6); ctx.scale(1, Math.abs(Math.cos(flipProgress*Math.PI))); ctx.translate(-W/2, -H*0.6);
    ctx.restore();
  });
  ctx.font = F.bodyBold;
  const aLines = wrapText(slide.answer||'', 0, 0, qMaxW, qLh);
  const aCardH = Math.max(H*0.18, aLines.length*qLh + 240*S);
  const aCardY = Math.min(H*0.65, H - aCardH - 200*S);
  withSprite(sprites, 'answer', () => {
    drawGlassCard(120*S, aCardY, W-240*S, aCardH, {glow:'rgba(78,205,196,0.12)', border:'rgba(78,205,196,0.15)'});
    drawIcon('check', W/2, aCardY+80*S, 80*S, C.success);
    drawText(slide.answer||'', W/2, aCardY+200*S, qMaxW, {font:F.bodyBold, color:C.white, align:'center', lh:qLh, maxY:aCardY+aCardH-40*S});
  });
  footer(progress, idx, total);
};

let currentSlide = 0, slideStart = 0, running = false, isTopScene = true;
window.slidesData = { slides: [] };
window.themeName = 'dark';
window.visualStyle = 'tech';

function buildSceneTimeline(slides) {
  const totalDur = slides.reduce((s,sl) => s + (sl.duration||10), 0);
  const scenes = [];
  const n = slides.length;
  if (n === 0) return { duration: 0, scenes: [] };
  const hookSlide = slides[0], heroSlide = slides[n-1], bodySlides = slides.slice(1, n-1);
  const hookDur = hookSlide.duration||4, heroDur = heroSlide.duration||5;
  let t = 0;
  scenes.push({ type:'hook', slide:hookSlide, slideIndex:0, enter:t, exit:t+hookDur, duration:hookDur });
  t += hookDur;
  const sceneTypes = ['process','insight','evidence'];
  bodySlides.forEach((slide, i) => {
    const dur = slide.duration || (totalDur-hookDur-heroDur)/Math.max(1,bodySlides.length);
    scenes.push({ type:sceneTypes[i%sceneTypes.length], slide, slideIndex:i+1, enter:t, exit:t+dur, duration:dur });
    t += dur;
  });
  scenes.push({ type:'hero', slide:heroSlide, slideIndex:n-1, enter:t, exit:t+heroDur, duration:heroDur });
  return { duration: t+heroDur, scenes };
}

function sceneOpacity(scene, globalT) {
  const fadeIn = 0.25, fadeOut = 0.2;
  if (globalT < scene.enter || globalT >= scene.exit) return 0;
  const inAlpha = applyEasing(Math.max(0, Math.min(1, (globalT-scene.enter)/fadeIn)), 'expoOut');
  const outAlpha = applyEasing(Math.max(0, Math.min(1, (scene.exit-globalT)/fadeOut)), 'easeIn');
  return Math.min(inAlpha, outAlpha);
}

function startPresentation() {
  const themeName = window.themeName || 'dark';
  C = THEMES[themeName] || THEMES.dark;
  if (window.brandSpec) {
    const bc = window.brandSpec.colors || {};
    const bd = window.brandSpec.derived || {};
    if (bc.primary) { C.accent = bc.primary; C.accentGlow = alpha(bc.primary, 0.12); }
    if (bc.accent) { C.gold = bc.accent; C.goldDim = alpha(bc.accent, 0.25); }
    if (bc.success) { C.cyan = bc.success; C.cyanDim = alpha(bc.success, 0.12); }
    if (bc.fg) { C.white = bc.fg; C.whiteDim = alpha(bc.fg, 0.6); }
    if (bc.muted) C.muted = bc.muted;
    if (bd['card-bg']) C.cardBg = bd['card-bg'];
    if (bd['card-border']) C.cardBorder = bd['card-border'];
    if (bc.success) C.success = bc.success;
    if (bc.warning) C.warn = bc.warning;
    if (bc.bg) { C.bg1 = bc.bg; C.bg2 = bc.bg; C.bg3 = bc.bg; }
  }
  currentSlide = 0; slideStart = performance.now(); running = true;
  requestAnimationFrame(tick);
}

function tick(ts) {
  if (!running) return;
  const slides = window.slidesData.slides;
  if (!slides || slides.length === 0) return;
  const totalDuration = slides.reduce((s,sl) => s + (sl.duration||10), 0);
  const elapsed = (ts - slideStart) / 1000;
  if (elapsed >= totalDuration) {
    const lastSlide = slides[slides.length-1];
    const tl = lastSlide.timeline || autoTimeline(lastSlide, slides.length-1, slides.length);
    const sprites = buildSprites({...lastSlide, timeline: tl});
    Object.values(sprites).forEach(sp => sp.update(lastSlide.duration, lastSlide.duration));
    const r = RENDERERS[lastSlide.type] || RENDERERS.bullet;
    isTopScene = true;
    r(lastSlide, 1, slides.length-1, slides.length, sprites);
    return;
  }
  const sceneData = buildSceneTimeline(slides);
  clearCanvas();

  const activeScenes = sceneData.scenes.filter(sc => elapsed >= sc.enter && elapsed < sc.exit);
  activeScenes.sort((a,b) => a.enter - b.enter);
  for (let si = 0; si < activeScenes.length; si++) {
    const scene = activeScenes[si];
    const opacity = sceneOpacity(scene, elapsed);
    if (opacity <= 0.01) continue;
    isTopScene = (si === activeScenes.length - 1);
    const fadeInDur = 0.25, fadeOutDur = 0.2;
    const isEntering = elapsed < scene.enter + fadeInDur;
    const isExiting = elapsed > scene.exit - fadeOutDur;
    ctx.save();
    ctx.globalAlpha = opacity;
    const localT = elapsed - scene.enter;
    const localDur = scene.duration;
    const localProgress = Math.min(1, localT / localDur);
    const slide = scene.slide;
    const tpl = SCENE_TEMPLATES[slide.type] || SCENE_TEMPLATES.bullet;
    if (isEntering) {
      applyTransition(tpl.transition, (elapsed - scene.enter) / fadeInDur, false);
    } else if (isExiting) {
      applyTransition(tpl.transition, (scene.exit - elapsed) / fadeOutDur, true);
    }
    applyCameraMotion(tpl.camera, localT, localDur);
    const tl = slide.timeline || autoTimeline(slide, scene.slideIndex, slides.length);
    const sprites = buildSprites({...slide, timeline: tl});
    Object.values(sprites).forEach(sp => sp.update(localT, localDur));
    const r = RENDERERS[slide.type] || RENDERERS.bullet;
    r(slide, localProgress, slides.indexOf(slide), slides.length, sprites);
    ctx.restore();
  }
  drawProgressLine(elapsed / totalDuration);
  requestAnimationFrame(tick);
}

window.startPresentation = startPresentation;
</script>
