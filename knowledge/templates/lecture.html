<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知本 · {{PROJECT_NAME}} · 讲课模式</title>
<style>
:root {
  --bg-primary: #0f1117;
  --bg-secondary: #1a1d27;
  --bg-card: #1e2130;
  --bg-card-hover: #252840;
  --text-primary: #e8e8ed;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --border-color: #2d3148;
  --accent-color: #4fc3f7;
  --accent-glow: rgba(79, 195, 247, 0.15);
  --success: #4caf50;
  --error: #ef5350;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-sans); background: var(--bg-primary); color: var(--text-primary); line-height: 1.8; }
body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-image: radial-gradient(circle at 20% 50%, var(--accent-glow) 0%, transparent 50%); pointer-events: none; z-index: 0; }

/* 封面 */
.cover { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
.cover h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 16px; }
.cover h1 .accent { color: var(--accent-color); }
.cover .subtitle { color: var(--text-secondary); font-size: 1.2rem; margin-bottom: 24px; }
.cover .tags { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.cover .tag { background: var(--bg-card); border: 1px solid var(--border-color); padding: 4px 16px; border-radius: 20px; font-size: 0.9rem; color: var(--text-secondary); }

/* 学习路径缩略图（左侧固定） */
.path-sidebar { position: fixed; left: 0; top: 50%; transform: translateY(-50%); z-index: 50; background: var(--bg-card); border: 1px solid var(--border-color); border-left: none; border-radius: 0 var(--radius) var(--radius) 0; padding: 12px 8px; display: none; }
.path-sidebar.visible { display: block; }
.path-sidebar .path-node { display: block; padding: 6px 12px; margin: 4px 0; border-radius: 4px; font-size: 0.75rem; color: var(--text-muted); cursor: pointer; transition: all 0.2s; white-space: nowrap; max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
.path-sidebar .path-node:hover { color: var(--text-primary); }
.path-sidebar .path-node.active { background: var(--accent-color); color: var(--bg-primary); font-weight: 600; }
.path-sidebar .path-node.done { color: var(--success); }
.path-sidebar .path-arrow { text-align: center; color: var(--text-muted); font-size: 0.7rem; }

/* 主体 */
.main { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 24px; }

/* 过渡页 */
.transition-page { min-height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 60px 24px; border-bottom: 1px solid var(--border-color); }
.transition-page .step-number { font-size: 0.85rem; color: var(--accent-color); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
.transition-page h2 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
.transition-page .step-subtitle { color: var(--text-secondary); font-size: 1rem; }

/* 知识点段 */
.knowledge-section { padding: 40px 0; border-bottom: 1px solid var(--border-color); }
.knowledge-section .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.knowledge-section .section-number { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-color); color: var(--bg-primary); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0; }
.knowledge-section .section-title { font-size: 1.5rem; font-weight: 700; }

/* 维度（全部展开，无折叠） */
.dimension-block { margin-bottom: 24px; padding: 20px; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); }
.dimension-block .dim-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.dimension-block .dim-number { width: 22px; height: 22px; border-radius: 50%; background: var(--bg-secondary); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 600; color: var(--text-secondary); }
.dimension-block .dim-title { font-weight: 600; font-size: 0.95rem; }
.dimension-block .dim-body { color: var(--text-secondary); line-height: 1.9; }
.dimension-block .dim-body p { margin-bottom: 10px; }
.dimension-block .dim-body strong { color: var(--text-primary); }
.dimension-block .dim-body .highlight { color: var(--accent-color); font-weight: 500; }
.dimension-block .dim-body .story-box { background: var(--bg-secondary); border-left: 3px solid var(--accent-color); padding: 14px 18px; border-radius: 0 var(--radius) var(--radius) 0; margin: 10px 0; }
.dimension-block .dim-body .example-list { list-style: none; padding: 0; }
.dimension-block .dim-body .example-list li { padding: 6px 0 6px 18px; position: relative; }
.dimension-block .dim-body .example-list li::before { content: ''; position: absolute; left: 0; top: 14px; width: 7px; height: 7px; border-radius: 50%; background: var(--accent-color); opacity: 0.6; }
.diagram { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 16px; margin: 12px 0; text-align: center; overflow-x: auto; }
.diagram svg { max-width: 100%; height: auto; }
.diagram svg text { font-family: var(--font-sans); }
.diagram .caption { font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; }

/* 小结 */
.section-summary { margin-top: 16px; padding: 12px 20px; background: var(--bg-secondary); border-left: 3px solid var(--success); border-radius: 0 var(--radius) var(--radius) 0; color: var(--text-secondary); font-size: 0.9rem; }

/* 综合思考 */
.synthesis { padding: 40px 0; }
.synthesis h2 { font-size: 1.5rem; margin-bottom: 16px; }
.synthesis .answer { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 24px; color: var(--text-secondary); line-height: 1.9; }

/* 演示控件 */
.lecture-controls { position: fixed; bottom: 24px; right: 24px; z-index: 100; display: flex; gap: 8px; align-items: center; }
.lecture-btn { width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: all 0.2s; box-shadow: var(--shadow); }
.lecture-btn:hover { border-color: var(--accent-color); color: var(--accent-color); }
.lecture-btn.active { background: var(--accent-color); color: var(--bg-primary); border-color: var(--accent-color); }
.lecture-progress { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent-color); z-index: 100; transition: width 0.3s ease; }
.lecture-indicator { position: fixed; top: 12px; right: 24px; z-index: 100; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 4px 14px; font-size: 0.8rem; color: var(--text-secondary); display: none; }
.lecture-indicator.visible { display: block; }

/* 高亮 */
.dimension-block.lecture-active { border-color: var(--accent-color) !important; box-shadow: 0 0 20px var(--accent-glow); }
.knowledge-section.lecture-section-active .section-number { animation: pulse 1s ease-in-out; }
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }

/* 响应式 */
@media (max-width: 768px) { .path-sidebar { display: none !important; } .cover h1 { font-size: 1.8rem; } }
@media print { body { background: white; color: black; } body::before { display: none; } .lecture-controls, .lecture-progress, .lecture-indicator, .path-sidebar { display: none !important; } }
</style>
</head>
<body>

<!-- 封面 -->
<div class="cover" id="cover">
  <h1>知本 · <span class="accent">{{PROJECT_NAME}}</span></h1>
  <div class="subtitle">{{PROJECT_SUBTITLE}}</div>
  <div class="tags">
    <span class="tag">{{SUBJECT_NAME}}</span>
    <span class="tag">{{GRADE_NAME}}</span>
    <span class="tag">讲课模式</span>
  </div>
</div>

<!-- 学习路径侧边栏 -->
<div class="path-sidebar" id="pathSidebar">
  {{PATH_SIDEBAR_NODES}}
</div>

<!-- 主体 -->
<div class="main">

  <!-- 学习路径图 -->
  <div class="diagram" style="margin-bottom:40px;">
    {{LEARNING_PATH_SVG}}
    <div class="caption">学习路径</div>
  </div>

  <!-- 知识点内容（由Skill生成时填充） -->
  {{KNOWLEDGE_SECTIONS}}

  <!-- 综合思考 -->
  <div class="synthesis">
    <h2>综合思考</h2>
    <div class="answer">{{SYNTHESIS_CONTENT}}</div>
  </div>

  <!-- 延伸问题 -->
  <div style="margin-top:32px; padding:20px; background:var(--bg-card); border:1px solid var(--border-color); border-radius:var(--radius-lg);">
    <h3 style="margin-bottom:12px;">延伸问题</h3>
    {{EXTENSION_QUESTIONS}}
  </div>
</div>

<!-- 演示控件 -->
<div class="lecture-progress" id="lectureProgress" style="width:0%"></div>
<div class="lecture-indicator" id="lectureIndicator"></div>
<div class="lecture-controls">
  <button class="lecture-btn" id="lectureBtn" title="讲课模式" onclick="toggleLecture()">▶</button>
  <button class="lecture-btn" id="lectureSpeedBtn" title="速度" onclick="cycleSpeed()" style="font-size:0.75rem;width:36px;height:36px;">1x</button>
</div>

<script>
const SPEEDS = [
  { label: '1x', dimPause: 3000, sectionPause: 6000 },
  { label: '2x', dimPause: 1500, sectionPause: 3000 },
  { label: '3x', dimPause: 1000, sectionPause: 2000 },
];
let speedIdx = 0, running = false, timer = null;

// 构建播放序列：所有维度块 + 过渡页
function buildSequence() {
  const seq = [];
  // 封面
  seq.push({ type: 'cover', el: document.getElementById('cover') });
  // 每个知识点段
  document.querySelectorAll('.knowledge-section').forEach(section => {
    seq.push({ type: 'transition', el: section.querySelector('.transition-page') || section });
    section.querySelectorAll('.dimension-block').forEach(dim => {
      seq.push({ type: 'dimension', el: dim, section: section });
    });
    seq.push({ type: 'summary', el: section.querySelector('.section-summary') });
  });
  // 综合思考
  seq.push({ type: 'synthesis', el: document.querySelector('.synthesis') });
  return seq;
}

let sequence = [], stepIdx = 0;

function toggleLecture() { running ? stopLecture() : startLecture(); }

function cycleSpeed() {
  speedIdx = (speedIdx + 1) % SPEEDS.length;
  document.getElementById('lectureSpeedBtn').textContent = SPEEDS[speedIdx].label;
}

function startLecture() {
  running = true; stepIdx = 0;
  sequence = buildSequence();
  const btn = document.getElementById('lectureBtn');
  btn.textContent = '⏸'; btn.classList.add('active');
  document.getElementById('lectureIndicator').classList.add('visible');
  document.getElementById('pathSidebar').classList.add('visible');
  // 清除所有高亮
  document.querySelectorAll('.dimension-block').forEach(d => d.classList.remove('lecture-active'));
  document.querySelectorAll('.knowledge-section').forEach(s => s.classList.remove('lecture-section-active'));
  document.querySelectorAll('.path-node').forEach(n => { n.classList.remove('active'); n.classList.remove('done'); });
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(() => runStep(), 800);
}

function stopLecture() {
  running = false;
  if (timer) clearTimeout(timer);
  const btn = document.getElementById('lectureBtn');
  btn.textContent = '▶'; btn.classList.remove('active');
  document.getElementById('lectureIndicator').classList.remove('visible');
  document.getElementById('lectureProgress').style.width = '0%';
  document.querySelectorAll('.dimension-block').forEach(d => d.classList.remove('lecture-active'));
  document.querySelectorAll('.knowledge-section').forEach(s => s.classList.remove('lecture-section-active'));
}

function runStep() {
  if (!running || stepIdx >= sequence.length) { stopLecture(); return; }
  const item = sequence[stepIdx];
  const speed = SPEEDS[speedIdx];
  const pause = (item.type === 'transition' || item.type === 'summary') ? speed.sectionPause : speed.dimPause;

  // 清除旧高亮
  document.querySelectorAll('.dimension-block').forEach(d => d.classList.remove('lecture-active'));
  document.querySelectorAll('.knowledge-section').forEach(s => s.classList.remove('lecture-section-active'));

  // 高亮当前
  if (item.type === 'dimension') {
    item.el.classList.add('lecture-active');
    if (item.section) item.section.classList.add('lecture-section-active');
    // 更新侧边栏
    updateSidebar(item.section);
  }

  // 滚动
  if (item.el) item.el.scrollIntoView({ behavior: 'smooth', block: 'center' });

  // 进度
  const pct = ((stepIdx + 1) / sequence.length * 100).toFixed(0);
  document.getElementById('lectureProgress').style.width = pct + '%';
  document.getElementById('lectureIndicator').textContent = `${stepIdx + 1} / ${sequence.length}`;

  stepIdx++;
  timer = setTimeout(() => runStep(), pause);
}

function updateSidebar(section) {
  if (!section) return;
  const idx = section.dataset.sectionIndex;
  document.querySelectorAll('.path-node').forEach(n => {
    const ni = n.dataset.nodeIndex;
    if (ni < idx) { n.classList.add('done'); n.classList.remove('active'); }
    else if (ni == idx) { n.classList.add('active'); n.classList.remove('done'); }
    else { n.classList.remove('active'); n.classList.remove('done'); }
  });
}

// 键盘控制
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); toggleLecture(); }
  if (e.code === 'ArrowRight' && running) { stepIdx = Math.min(stepIdx + 5, sequence.length - 1); }
  if (e.code === 'ArrowLeft' && running) { stepIdx = Math.max(stepIdx - 5, 0); }
});

// URL参数自动启动
(function() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('lecture') === '1') {
    const s = parseInt(params.get('speed'));
    if (s >= 1 && s <= 3) { speedIdx = s - 1; document.getElementById('lectureSpeedBtn').textContent = SPEEDS[speedIdx].label; }
    window.addEventListener('load', () => setTimeout(() => startLecture(), 500));
  }
})();
</script>
</body>
</html>
