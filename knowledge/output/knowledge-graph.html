<style>

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-sans); background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; }
.header { padding: 32px 24px 16px; max-width: 1200px; margin: 0 auto; border-bottom: 1px solid var(--border-color); }
.header h1 { font-size: 1.8rem; font-weight: 700; }
.header h1 .accent { color: var(--accent-color); }
.header .desc { color: var(--text-secondary); font-size: 0.9rem; margin-top: 4px; }
.main { max-width: 1200px; margin: 0 auto; padding: 24px; }

.view-switcher { display: flex; gap: 4px; margin-bottom: 16px; background: var(--bg-secondary); border-radius: var(--radius); padding: 4px; width: fit-content; }
.view-btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 0.85rem; cursor: pointer; background: transparent; color: var(--text-secondary); transition: all 0.2s; font-family: var(--font-sans); }
.view-btn.active { background: var(--accent-color); color: #fff; }
.view-btn:hover:not(.active) { color: var(--text-primary); }

.filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.filter-bar label { font-size: 0.85rem; color: var(--text-secondary); }
.filter-btn { padding: 4px 12px; border: 1px solid var(--border-color); border-radius: 16px; font-size: 0.8rem; cursor: pointer; background: var(--bg-secondary); color: var(--text-secondary); transition: all 0.2s; font-family: var(--font-sans); }
.filter-btn.active { border-color: var(--accent-color); color: var(--accent-color); background: rgba(66,165,245,0.1); }
.filter-btn:hover { border-color: var(--accent-color); }

.section { margin-bottom: 32px; }
.section h2 { font-size: 1.1rem; color: var(--text-primary); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 8px; }
.phase-tag { font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; }
.phase-小学 { background: rgba(156,204,101,0.15); color: #9ccc65; }
.phase-初中 { background: rgba(66,165,245,0.15); color: #42a5f5; }
.phase-高中 { background: rgba(239,83,80,0.15); color: #ef5350; }

.domain-group { margin-bottom: 20px; }
.domain-group h3 { font-size: 0.95rem; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.subject-label { font-size: 0.75rem; padding: 2px 8px; border-radius: 10px; }
.subject-math { background: rgba(66,165,245,0.15); color: #42a5f5; }
.subject-physics { background: rgba(76,175,80,0.15); color: #4caf50; }
.subject-chinese { background: rgba(239,83,80,0.15); color: #ef5350; }
.subject-english { background: rgba(156,204,101,0.15); color: #9ccc65; }
.subject-it { background: rgba(255,152,0,0.15); color: #ff9800; }
.subject-chemistry { background: rgba(171,71,188,0.15); color: #ab47bc; }
.subject-biology { background: rgba(38,166,154,0.15); color: #26a69a; }
.subject-history { background: rgba(255,183,77,0.15); color: #ffb74d; }
.subject-geography { background: rgba(77,208,225,0.15); color: #4dd0e1; }

.domain-label { font-size: 0.7rem; padding: 1px 6px; border-radius: 8px; }
.domain-数与代数 { background: rgba(79,195,247,0.15); color: #4fc3f7; }
.domain-图形与几何 { background: rgba(38,198,218,0.15); color: #26c6da; }
.domain-统计与概率 { background: rgba(255,202,40,0.15); color: #ffca28; }
.domain-综合与实践 { background: rgba(129,199,132,0.15); color: #81c784; }

.domain-语法体系 { background: rgba(102,187,106,0.15); color: #66bb6a; }
.domain-功能意念 { background: rgba(129,199,132,0.15); color: #81c784; }
.domain-语音知识 { background: rgba(165,214,167,0.15); color: #a5d6a7; }
.domain-词汇体系 { background: rgba(200,230,201,0.15); color: #c8e6c9; }
.domain-文化知识 { background: rgba(76,175,80,0.15); color: #4caf50; }
.domain-语言技能 { background: rgba(56,142,60,0.15); color: #388e3c; }


.node-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
.node-item { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 10px 14px; font-size: 0.88rem; color: var(--text-secondary); text-decoration: none; transition: all 0.2s; display: flex; align-items: center; gap: 6px; cursor: pointer; }
.node-item:hover { border-color: var(--accent-color); color: var(--text-primary); }
.node-item.decomposed { border-left: 3px solid #4caf50; }
.node-item.pending { border-left: 3px solid var(--text-muted); opacity: 0.75; }
.node-item .grade-tag { font-size: 0.7rem; color: var(--text-muted); margin-left: auto; }
.node-item .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.node-item.decomposed .status-dot { background: #4caf50; }
.node-item.pending .status-dot { background: var(--text-muted); }

.project-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 12px; }
.project-card .project-name { font-size: 1.1rem; font-weight: 600; color: var(--accent-color); margin-bottom: 8px; }
.project-card .project-meta { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px; }
.project-card .kp-list { display: flex; flex-wrap: wrap; gap: 8px; }
.project-card .kp-tag { padding: 4px 12px; border-radius: 16px; font-size: 0.8rem; text-decoration: none; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-secondary); transition: all 0.2s; }
.project-card .kp-tag:hover { border-color: var(--accent-color); color: var(--accent-color); }

.stats { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.stat-item { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 12px 20px; text-align: center; min-width: 90px; }
.stat-item .stat-num { font-size: 1.5rem; font-weight: 700; color: var(--accent-color); }
.stat-item .stat-label { font-size: 0.75rem; color: var(--text-muted); }

/* 关联面板 */
.relation-panel { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 20px; margin-top: 16px; }
.relation-panel h3 { font-size: 1rem; margin-bottom: 8px; color: var(--accent-color); }
.relation-panel .meta-info { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px; }
.relation-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.relation-tag { padding: 4px 10px; border-radius: 14px; font-size: 0.8rem; border: 1px solid var(--border-color); background: var(--bg-secondary); color: var(--text-secondary); cursor: pointer; }
.relation-tag:hover { border-color: var(--accent-color); color: var(--accent-color); }
.relation-tag.prereq { border-color: rgba(79,195,247,0.3); color: #4fc3f7; }
.relation-tag.subseq { border-color: rgba(239,83,80,0.3); color: #ef5350; }
.relation-tag.parallel { border-color: rgba(255,202,40,0.3); color: #ffca28; }
.relation-tag.contains { border-color: rgba(129,199,132,0.3); color: #81c784; }

.footer { max-width: 1200px; margin: 40px auto 0; padding: 24px; border-top: 1px solid var(--border-color); text-align: center; color: var(--text-muted); font-size: 0.8rem; }
</style>

async function loadData() {
  // 方法1: 尝试从外部JSON加载（获取最新数据）
  try {
    const resp = await fetch('knowledge-graph.json');
    if (resp.ok) { GRAPH_DATA = await resp.json(); }
    else throw new Error('HTTP ' + resp.status);
  } catch(e1) {
    // 方法2: 使用内嵌数据（file://协议下也能工作）
    console.warn('fetch failed, using embedded data');
    GRAPH_DATA = EMBEDDED_DATA;
  }
  // 数据适配：统一字段名
  adaptData(GRAPH_DATA);
  setupFilters();
  renderStats();
  renderDomainView();
  renderProjectView();
}

function adaptData(data) {
  // 节点：确保有 name 字段（key 即 name）
  if (data.nodes) {
    Object.entries(data.nodes).forEach(([key, node]) => {
      if (!node.name) node.name = key;
      if (!node.type) node.type = 'knowledge';
    });
  }
  // 边：source/target → from/to
  if (data.edges) {
    data.edges.forEach(edge => {
      if (edge.source && !edge.from) { edge.from = edge.source; delete edge.source; }
      if (edge.target && !edge.to) { edge.to = edge.target; delete edge.target; }
    });
  }
}

function isDecomposed(node) {
  return !!node.html_file;
}

function linkPath(htmlFile) {
  if (!htmlFile) return '#';
  return htmlFile.replace(/^output\//, '').replace(/^输出\//, '');
}

function setupFilters() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.type;
      const val = btn.dataset.val;
      filters[type] = val;
      document.querySelectorAll(`.filter-btn[data-type="${type}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // 学段切换时联动年级按钮可见性
      if (type === 'phase') updateGradeButtons();
      renderDomainView();
    });
  });
  updateGradeButtons();
}

function updateGradeButtons() {
  const phaseGradeMap = { '小学': [1,2,3,4,5,6], '初中': [7,8,9], '高中': [10,11,12] };
  const phase = filters.phase;
  document.querySelectorAll('.filter-btn[data-type="grade"]').forEach(btn => {
    const g = parseInt(btn.dataset.val);
    if (phase === 'all') {
      btn.style.display = '';
    } else {
      const allowed = phaseGradeMap[phase] || [];
      btn.style.display = allowed.includes(g) ? '' : 'none';
    }
  });
  // 如果当前选中的年级不在允许范围内，重置为全部
  if (phase !== 'all') {
    const allowed = phaseGradeMap[phase] || [];
    if (filters.grade !== 'all' && !allowed.includes(parseInt(filters.grade))) {
      filters.grade = 'all';
      document.querySelectorAll('.filter-btn[data-type="grade"]').forEach(b => b.classList.remove('active'));
      document.querySelector('.filter-btn[data-type="grade"][data-val="all"]').classList.add('active');
    }
  }
}

function switchView(view) {
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('domain-view').style.display = view === 'domain' ? '' : 'none';
  document.getElementById('project-view').style.display = view === 'project' ? '' : 'none';
  document.getElementById('graph-view').style.display = view === 'graph' ? '' : 'none';
  if (view === 'graph') renderGraphView();
}

function filterNode(n) {
  if (n.type === 'project') return false;
  if (filters.phase !== 'all' && n.phase !== filters.phase) return false;
  if (filters.grade !== 'all' && String(n.grade) !== filters.grade) return false;
  if (filters.status === 'decomposed' && !isDecomposed(n)) return false;
  if (filters.status === 'pending' && isDecomposed(n)) return false;
  return true;
}

function renderStats() {
  const nodes = Object.values(GRAPH_DATA.nodes);
  const knowledgeNodes = nodes.filter(n => n.type !== 'project');
  const projectNodes = nodes.filter(n => n.type === 'project');
  const decomposed = knowledgeNodes.filter(n => isDecomposed(n)).length;
  const pending = knowledgeNodes.length - decomposed;
  const phases = [...new Set(knowledgeNodes.map(n => n.phase))];
  const subjects = [...new Set(knowledgeNodes.map(n => n.subject))];
  const grades = [...new Set(knowledgeNodes.map(n => n.grade))].sort((a,b) => a-b);

  document.getElementById('stats').innerHTML = `
    <div class="stat-item"><div class="stat-num">${knowledgeNodes.length}</div><div class="stat-label">知识点</div></div>
    <div class="stat-item"><div class="stat-num" style="color:#4caf50">${decomposed}</div><div class="stat-label">已拆解</div></div>
    <div class="stat-item"><div class="stat-num" style="color:var(--text-muted)">${pending}</div><div class="stat-label">待拆解</div></div>
    <div class="stat-item"><div class="stat-num">${projectNodes.length}</div><div class="stat-label">项目</div></div>
    <div class="stat-item"><div class="stat-num">${GRAPH_DATA.edges ? GRAPH_DATA.edges.length : 0}</div><div class="stat-label">关联</div></div>
    <div class="stat-item"><div class="stat-num">${grades.length}</div><div class="stat-label">年级</div></div>
    <div class="stat-item"><div class="stat-num">${subjects.length}</div><div class="stat-label">学科</div></div>
  `;
}

function renderDomainView() {
  const nodes = Object.entries(GRAPH_DATA.nodes).filter(([k, n]) => filterNode(n));
  const container = document.getElementById('domain-view');

  // 按年级分组
  const gradeGroups = {};
  nodes.forEach(([key, n]) => {
    const gKey = n.grade || 0;
    if (!gradeGroups[gKey]) gradeGroups[gKey] = { phase: n.phase, grade: n.grade, nodes: [] };
    gradeGroups[gKey].nodes.push({ key, name: key, ...n });
  });

  const sortedGrades = Object.keys(gradeGroups).sort((a, b) => {
    const pa = gradeGroups[a].phase, pb = gradeGroups[b].phase;
    const pd = PHASE_ORDER.indexOf(pa) - PHASE_ORDER.indexOf(pb);
    if (pd !== 0) return pd;
    return parseInt(a) - parseInt(b);
  });

  const GRADE_LABELS = {1:'一年级',2:'二年级',3:'三年级',4:'四年级',5:'五年级',6:'六年级',7:'七年级',8:'八年级',9:'九年级',10:'高一',11:'高二',12:'高三'};

  let html = '';
  sortedGrades.forEach(gKey => {
    const g = gradeGroups[gKey];
    const label = GRADE_LABELS[g.grade] || `${g.grade}年级`;
    const decomposedCount = g.nodes.filter(n => isDecomposed(n)).length;

    // 按学科+知识域子分组
    const subGroups = {};
    g.nodes.forEach(n => {
      const subKey = `${n.subject}|${n.domain || '其他'}`;
      if (!subGroups[subKey]) subGroups[subKey] = { subject: n.subject, domain: n.domain, nodes: [] };
      subGroups[subKey].nodes.push(n);
    });
    const sortedSubKeys = Object.keys(subGroups).sort((a, b) => {
      const [sa, da] = a.split('|');
      const [sb, db] = b.split('|');
      const sd = SUBJECT_ORDER.indexOf(sa) - SUBJECT_ORDER.indexOf(sb);
      if (sd !== 0) return sd;
      return da.localeCompare(db);
    });

    html += `<div class="section"><h2>${label}<span class="phase-tag phase-${g.phase}">${g.phase}</span><span style="font-size:0.75rem;color:var(--text-muted);margin-left:8px">${decomposedCount}/${g.nodes.length} 已拆解</span></h2>`;

    sortedSubKeys.forEach(subKey => {
      const sg = subGroups[subKey];
      const subjectName = SUBJECT_NAMES[sg.subject] || sg.subject;
      const domainTag = sg.domain ? `<span class="domain-label domain-${sg.domain}">${sg.domain}</span>` : '';
      html += `<div class="domain-group">
        <h3><span class="subject-label subject-${sg.subject}">${subjectName}</span> ${domainTag} <span style="font-size:0.75rem;color:var(--text-muted)">${sg.nodes.length}个知识点</span></h3>
        <div class="node-grid">
          ${sg.nodes.sort((a, b) => {
            const sa = a.semester === '下' ? 1 : 0;
            const sb = b.semester === '下' ? 1 : 0;
            return sa - sb || a.name.localeCompare(b.name);
          }).map(n => {
            const decomposed = isDecomposed(n);
            const cls = decomposed ? 'decomposed' : 'pending';
            const href = decomposed ? linkPath(n.html_file) : '#';
            const semTag = n.semester ? `<span style="font-size:0.65rem;color:var(--text-muted)">${n.semester}</span>` : '';
            return `<a href="${href}" class="node-item ${cls}" ${decomposed ? '' : 'onclick="event.preventDefault();showRelations(\''+n.key+'\')"'} title="${decomposed ? '点击查看拆解详情' : '待拆解 - 点击查看关联'}">
              <span class="status-dot"></span>
              ${n.name}
              ${semTag}
            </a>`;
          }).join('')}
        </div>
      </div>`;
    });

    html += '</div>';
  });

  if (!html) html = '<div style="color:var(--text-muted);text-align:center;padding:40px">没有匹配的知识点</div>';
  container.innerHTML = html;
}

function renderProjectView() {
  const nodes = Object.values(GRAPH_DATA.nodes);
  const projectNodes = nodes.filter(n => n.type === 'project');
  const container = document.getElementById('project-view');

  let html = '<div class="section"><h2>项目式学习</h2>';
  projectNodes.forEach(p => {
    const subjectNames = (p.subjects || []).map(s => SUBJECT_NAMES[s] || s).join('/');
    const containsNodes = (p.contains || []).map(name => GRAPH_DATA.nodes[name]).filter(Boolean);
    html += `<div class="project-card">
      <div class="project-name">${p.name}</div>
      <div class="project-meta">${subjectNames} · ${p.phase} · ${p.contains ? p.contains.length : 0}个知识点</div>
      <div class="kp-list">
        ${containsNodes.map(n =>
          `<a href="${linkPath(n.html_file)}" class="kp-tag"><span class="kp-subject subject-${n.subject}">${SUBJECT_NAMES[n.subject]}</span>${n.name}</a>`
        ).join('')}
      </div>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function showRelations(key) {
  const node = GRAPH_DATA.nodes[key];
  if (!node) return;

  const edges = GRAPH_DATA.edges || [];
  const prereqs = edges.filter(e => e.to === key && e.type === 'prerequisite').map(e => e.from);
  const subseqs = edges.filter(e => e.from === key && e.type === 'subsequent').map(e => e.to);
  const parallels = edges.filter(e => (e.from === key || e.to === key) && e.type === 'parallel').map(e => e.from === key ? e.to : e.from);
  const contains = edges.filter(e => e.from === key && e.type === 'contains').map(e => e.to);

  const panel = document.getElementById('relation-panel');
  const decomposed = isDecomposed(node);

  let html = `<div class="relation-panel">
    <h3>${node.name} <span style="font-size:0.8rem;color:${decomposed ? '#4caf50' : 'var(--text-muted)'}">${decomposed ? '已拆解' : '待拆解'}</span></h3>
    <div class="meta-info">${node.phase || ''} · ${node.grade ? node.grade + '年级' : ''} · ${node.domain || ''} · ${SUBJECT_NAMES[node.subject] || node.subject || ''}</div>`;

  if (decomposed && node.html_file) {
    html += `<div style="margin-bottom:12px"><a href="${linkPath(node.html_file)}" style="color:var(--accent-color);font-size:0.9rem">查看拆解详情 →</a></div>`;
  }

  if (prereqs.length > 0) {
    html += `<div><span style="font-size:0.8rem;color:#4fc3f7">前导知识：</span><div class="relation-list">${prereqs.map(r => { const rn = GRAPH_DATA.nodes[r]; const rd = rn && isDecomposed(rn); return rd ? `<a href="${linkPath(rn.html_file)}" class="relation-tag prereq" style="text-decoration:none">${r}</a>` : `<span class="relation-tag prereq" onclick="showRelations('${r}')">${r}</span>`; }).join('')}</div></div>`;
  }
  if (subseqs.length > 0) {
    html += `<div><span style="font-size:0.8rem;color:#ef5350">后续知识：</span><div class="relation-list">${subseqs.map(r => { const rn = GRAPH_DATA.nodes[r]; const rd = rn && isDecomposed(rn); return rd ? `<a href="${linkPath(rn.html_file)}" class="relation-tag subseq" style="text-decoration:none">${r}</a>` : `<span class="relation-tag subseq" onclick="showRelations('${r}')">${r}</span>`; }).join('')}</div></div>`;
  }
  if (parallels.length > 0) {
    html += `<div><span style="font-size:0.8rem;color:#ffca28">平行知识：</span><div class="relation-list">${parallels.map(r => { const rn = GRAPH_DATA.nodes[r]; const rd = rn && isDecomposed(rn); return rd ? `<a href="${linkPath(rn.html_file)}" class="relation-tag parallel" style="text-decoration:none">${r}</a>` : `<span class="relation-tag parallel" onclick="showRelations('${r}')">${r}</span>`; }).join('')}</div></div>`;
  }
  if (contains.length > 0) {
    html += `<div><span style="font-size:0.8rem;color:#81c784">包含知识：</span><div class="relation-list">${contains.map(r => { const rn = GRAPH_DATA.nodes[r]; const rd = rn && isDecomposed(rn); return rd ? `<a href="${linkPath(rn.html_file)}" class="relation-tag contains" style="text-decoration:none">${r}</a>` : `<span class="relation-tag contains" onclick="showRelations('${r}')">${r}</span>`; }).join('')}</div></div>`;
  }
  if (prereqs.length === 0 && subseqs.length === 0 && parallels.length === 0 && contains.length === 0) {
    html += '<div style="color:var(--text-muted);font-size:0.85rem">暂无关联数据</div>';
  }
  html += '</div>';
  panel.innerHTML = html;
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function renderGraphView() {
  const container = document.getElementById('graph-view');
  const nodes = Object.entries(GRAPH_DATA.nodes).filter(([k, n]) => n.type !== 'project');
  const nodeNames = new Set(nodes.map(([k]) => k));
  const edges = (GRAPH_DATA.edges || []).filter(e => nodeNames.has(e.from) && nodeNames.has(e.to));

  const canvas = document.createElement('canvas');
  canvas.className = 'graph-canvas';
  canvas.style.cssText = 'width:100%;height:600px;border:1px solid var(--border-color);border-radius:var(--radius-lg);background:var(--bg-secondary)';
  canvas.width = 1200;
  canvas.height = 600;
  container.innerHTML = '';
  container.appendChild(canvas);

  const ctx = canvas.getContext('2d');
  const nodeMap = {};
  const nodeArr = [];

  nodes.forEach(([name, n]) => {
    const x = 100 + Math.random() * (canvas.width - 200);
    const y = 50 + Math.random() * (canvas.height - 100);
    nodeMap[name] = { x, y, vx: 0, vy: 0, ...n, key: name };
    nodeArr.push(nodeMap[name]);
  });

  // Position by grade
  const gradeGroups = {};
  nodeArr.forEach(n => {
    const key = `${n.phase}-${n.grade}`;
    if (!gradeGroups[key]) gradeGroups[key] = [];
    gradeGroups[key].push(n);
  });
  const gradeKeys = Object.keys(gradeGroups).sort((a, b) => {
    const [pa, ga] = a.split('-');
    const [pb, gb] = b.split('-');
    const pd = PHASE_ORDER.indexOf(pa) - PHASE_ORDER.indexOf(pb);
    if (pd !== 0) return pd;
    return parseInt(ga) - parseInt(gb);
  });
  gradeKeys.forEach((key, gi) => {
    const group = gradeGroups[key];
    const x = 60 + (gi / (gradeKeys.length - 1 || 1)) * (canvas.width - 120);
    group.forEach((n, ni) => {
      n.x = x + (Math.random() - 0.5) * 50;
      n.y = 40 + (ni / (group.length - 1 || 1)) * (canvas.height - 80);
    });
  });

  // Force simulation
  for (let iter = 0; iter < 80; iter++) {
    for (let i = 0; i < nodeArr.length; i++) {
      for (let j = i + 1; j < nodeArr.length; j++) {
        const dx = nodeArr[j].x - nodeArr[i].x;
        const dy = nodeArr[j].y - nodeArr[i].y;
        const dist = Math.sqrt(dx * dx + dy * dy) + 1;
        const force = 600 / (dist * dist);
        nodeArr[i].vx -= dx * force; nodeArr[i].vy -= dy * force;
        nodeArr[j].vx += dx * force; nodeArr[j].vy += dy * force;
      }
    }
    edges.forEach(e => {
      const a = nodeMap[e.from], b = nodeMap[e.to];
      if (!a || !b) return;
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy) + 1;
      const force = (dist - 60) * 0.008;
      a.vx += dx * force; a.vy += dy * force;
      b.vx -= dx * force; b.vy -= dy * force;
    });
    nodeArr.forEach(n => {
      n.x += n.vx * 0.4; n.y += n.vy * 0.4;
      n.vx *= 0.4; n.vy *= 0.4;
      n.x = Math.max(30, Math.min(canvas.width - 30, n.x));
      n.y = Math.max(20, Math.min(canvas.height - 20, n.y));
    });
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  edges.forEach(e => {
    const a = nodeMap[e.from], b = nodeMap[e.to];
    if (!a || !b) return;
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = e.type === 'prerequisite' ? 'rgba(79,195,247,0.25)' : e.type === 'subsequent' ? 'rgba(239,83,80,0.25)' : e.type === 'parallel' ? 'rgba(255,202,40,0.25)' : 'rgba(129,199,132,0.25)';
    ctx.lineWidth = 1; ctx.stroke();
  });
  nodeArr.forEach(n => {
    const color = n.domain && DOMAIN_COLORS[n.domain] ? DOMAIN_COLORS[n.domain] : isDecomposed(n) ? '#4caf50' : '#6b7280';
    ctx.beginPath(); ctx.arc(n.x, n.y, isDecomposed(n) ? 5 : 3, 0, Math.PI * 2);
    ctx.fillStyle = color; ctx.fill();
    if (isDecomposed(n)) {
      ctx.fillStyle = '#e8e8ed'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(n.name, n.x, n.y - 8);
    }
  });
}

loadData();
</script>
