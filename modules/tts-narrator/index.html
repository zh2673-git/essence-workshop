<div class="tts-narrator-widget">
  <div class="tts-narrator-bar">
    <button class="tts-btn" id="ttsPlayBtn" onclick="toggleTTS()" title="播放/暂停">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    </button>
    <div class="tts-progress">
      <div class="tts-progress-fill" id="ttsProgressFill"></div>
    </div>
    <span class="tts-time" id="ttsTimeDisplay">0:00</span>
    <select class="tts-voice-select" id="ttsVoiceSelect">
      <option value="zh-CN-XiaoxiaoNeural">晓晓</option>
      <option value="zh-CN-YunxiNeural">云希</option>
      <option value="zh-CN-YunjianNeural">云健</option>
    </select>
    <div class="tts-speed-control">
      <label>语速</label>
      <input type="range" min="0.5" max="2" step="0.1" value="1" id="ttsSpeedRange" onchange="updateTTSSpeed()">
      <span id="ttsSpeedValue">1.0x</span>
    </div>
  </div>
</div>
