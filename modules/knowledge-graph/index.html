<!-- 知识图谱浏览器：可交互的节点关系图 -->
<div class="knowledge-graph" data-module="knowledge-graph">
  <div class="kg-toolbar">
    <span class="kg-title">知识图谱</span>
    <div class="kg-controls">
      <button class="kg-zoom-in" title="放大">+</button>
      <button class="kg-zoom-out" title="缩小">-</button>
      <button class="kg-reset" title="重置">↺</button>
    </div>
  </div>
  <div class="kg-viewport">
    <svg class="kg-svg" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
      <g class="kg-edges"></g>
      <g class="kg-nodes"></g>
    </svg>
  </div>
  <div class="kg-detail" style="display:none;">
    <div class="kg-detail-header">
      <span class="kg-detail-name"></span>
      <button class="kg-detail-close">×</button>
    </div>
    <div class="kg-detail-body"></div>
  </div>
</div>
