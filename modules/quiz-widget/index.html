<div class="quiz-widget-container">
  <div class="quiz-widget-question">
    <p>以下哪个是本质工坊的核心设计原则？</p>
  </div>
  <div class="quiz-widget-options">
    <div class="quiz-widget-option" data-correct="false" onclick="selectQuizOption(this)">
      <span class="quiz-widget-letter">A</span>
      <span class="quiz-widget-text">功能堆叠，越多越好</span>
    </div>
    <div class="quiz-widget-option" data-correct="true" onclick="selectQuizOption(this)">
      <span class="quiz-widget-letter">B</span>
      <span class="quiz-widget-text">三层架构，元素→管线→平台</span>
    </div>
    <div class="quiz-widget-option" data-correct="false" onclick="selectQuizOption(this)">
      <span class="quiz-widget-letter">C</span>
      <span class="quiz-widget-text">单管线输出，简单至上</span>
    </div>
    <div class="quiz-widget-option" data-correct="false" onclick="selectQuizOption(this)">
      <span class="quiz-widget-letter">D</span>
      <span class="quiz-widget-text">只支持文本输出</span>
    </div>
  </div>
  <div class="quiz-widget-feedback" id="quizFeedback"></div>
</div>
