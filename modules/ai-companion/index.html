<div class="ai-companion-widget" id="aiCompanion">
  <button class="ai-companion-toggle" onclick="toggleAICompanion()" title="AI学伴">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
  </button>
  <div class="ai-companion-panel" id="aiCompanionPanel">
    <div class="ai-companion-header">
      <span>AI 学伴</span>
      <button onclick="toggleAICompanion()" class="ai-companion-close">&times;</button>
    </div>
    <div class="ai-companion-messages" id="aiCompanionMessages">
      <div class="ai-msg ai-msg-system">你好！我是AI学伴，可以帮你理解当前页面的内容。试着问我问题吧。</div>
    </div>
    <div class="ai-companion-input">
      <input type="text" id="aiCompanionInput" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')sendAICompanionMsg()">
      <button onclick="sendAICompanionMsg()">发送</button>
    </div>
  </div>
</div>
