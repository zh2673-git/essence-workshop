<!-- 对比表格：可交互的对比分析表 -->
<div class="comparison-table" data-module="comparison-table">
  <div class="ct-header">
    <span class="ct-title">对比分析</span>
    <div class="ct-toggle">
      <button class="ct-btn active" data-view="table">表格</button>
      <button class="ct-btn" data-view="cards">卡片</button>
    </div>
  </div>
  <div class="ct-view ct-view-table active">
    <slot name="table"></slot>
  </div>
  <div class="ct-view ct-view-cards">
    <slot name="cards"></slot>
  </div>
</div>
