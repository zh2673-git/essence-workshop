<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{title}</title>
  <style>
    :root {{
      --primary: {primary_color};
      --accent: {accent_color};
      --bg: {bg_color};
      --fg: {fg_color};
      --muted: {muted_color};
      --border: {border_color};
      --primary-dim: {primary_dim};
      --accent-dim: {accent_dim};
      --card-bg: {card_bg};
      --card-border: {card_border};
      --primary-rgb: {primary_rgb};
      --accent-rgb: {accent_rgb};
      --font-display: {font_display};
      --font-body: {font_body};
      --font-mono: {font_mono};
      --radius: 8px;
      --slide-width: 100vw;
      --slide-height: 100vh;
      --nav-height: 56px;
      --sidebar-width: 48px;
      --transition-speed: 0.5s;
    }}

    * {{ margin: 0; padding: 0; box-sizing: border-box; }}

    body {{
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.8;
      overflow: hidden;
      height: 100vh;
    }}

    .presentation {{
      position: relative;
      width: 100vw;
      height: 100vh;
    }}

    .slides-container {{
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: calc(100% - var(--nav-height));
      overflow: hidden;
    }}

    .slide-page {{
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px 80px;
      opacity: 0;
      transform: translateX(40px);
      transition: opacity var(--transition-speed) ease, transform var(--transition-speed) ease;
      pointer-events: none;
      overflow-y: auto;
    }}

    .slide-page.active {{
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }}

    .slide-page.exit-left {{
      opacity: 0;
      transform: translateX(-40px);
    }}

    .slide-page.exit-right {{
      opacity: 0;
      transform: translateX(40px);
    }}

    /* ══════════════════════════════════════════
       页型CSS装饰 — 每种页型独立视觉风格
       ══════════════════════════════════════════ */

    .slide-page[data-page-type="cover"] {{
      background: linear-gradient(135deg, var(--primary-dim) 0%, var(--bg) 60%);
      position: relative;
      overflow: hidden;
    }}
    .slide-page[data-page-type="cover"]::before {{
      content: '';
      position: absolute;
      top: -20%; right: -10%;
      width: 50%; height: 80%;
      background: radial-gradient(circle, var(--accent-dim) 0%, transparent 70%);
      pointer-events: none;
    }}
    .slide-page[data-page-type="cover"]::after {{
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }}
    .slide-page[data-page-type="cover"] h1 {{
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 800;
      line-height: 1.2;
      color: var(--fg);
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }}
    .slide-page[data-page-type="cover"] .subtitle {{
      font-size: 20px;
      color: var(--muted);
      font-weight: 400;
    }}
    .slide-page[data-page-type="cover"] .cover-decoration {{
      position: absolute;
      top: -80px;
      right: -80px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: var(--primary-dim);
    }}
    .slide-page[data-page-type="cover"] .cover-decoration-2 {{
      position: absolute;
      bottom: -60px;
      left: -60px;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: var(--accent-dim);
    }}

    .slide-page[data-page-type="objectives"] {{
      background: var(--bg);
    }}
    .slide-page[data-page-type="objectives"]::before {{
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--primary);
    }}
    .slide-page[data-page-type="objectives"] .objective-list {{
      list-style: none;
      padding: 0;
      counter-reset: obj-counter;
    }}
    .slide-page[data-page-type="objectives"] .objective-list li {{
      padding: 12px 20px 12px 48px;
      margin: 8px 0;
      position: relative;
      border-bottom: 1px solid var(--border);
      counter-increment: obj-counter;
    }}
    .slide-page[data-page-type="objectives"] .objective-list li::before {{
      content: counter(obj-counter);
      position: absolute;
      left: 0;
      width: 32px; height: 32px;
      background: var(--primary);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }}

    .slide-page[data-page-type="concept"] {{
      background: var(--bg);
      border-left: 3px solid var(--primary);
    }}
    .slide-page[data-page-type="concept"]::after {{
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 40%;
      height: 40%;
      background: radial-gradient(circle at bottom right, var(--primary-dim) 0%, transparent 70%);
      pointer-events: none;
    }}
    .slide-page[data-page-type="concept"] .key-point {{
      margin-top: 24px;
      padding: 20px 24px;
      background: var(--accent-dim);
      border-radius: var(--radius);
      border-left: 3px solid var(--accent);
    }}
    .slide-page[data-page-type="concept"] .key-point-title {{
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 8px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }}

    .slide-page[data-page-type="interactive"] {{
      background: linear-gradient(180deg, var(--bg) 0%, var(--primary-dim) 100%);
    }}
    .slide-page[data-page-type="interactive"]::before {{
      content: '';
      position: absolute;
      top: -20px;
      right: -20px;
      width: 120px;
      height: 120px;
      border: 2px solid var(--primary-dim);
      border-radius: 50%;
    }}
    .slide-page[data-page-type="interactive"] h2::after {{
      content: '互动';
      display: inline-block;
      margin-left: 12px;
      font-size: 12px;
      padding: 2px 10px;
      background: var(--accent);
      color: white;
      border-radius: 4px;
      vertical-align: middle;
      font-weight: 600;
    }}

    .slide-page[data-page-type="quiz"] {{
      background: var(--bg);
      position: relative;
    }}
    .slide-page[data-page-type="quiz"]::before {{
      content: '?';
      position: absolute;
      top: 8%; right: 6%;
      font-size: 8em;
      font-weight: 900;
      color: var(--accent-dim);
      line-height: 1;
      pointer-events: none;
    }}
    .slide-page[data-page-type="quiz"] .quiz-options {{
      margin-top: 16px;
    }}
    .slide-page[data-page-type="quiz"] .quiz-option {{
      padding: 14px 20px;
      margin: 10px 0;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 16px;
    }}
    .slide-page[data-page-type="quiz"] .quiz-option:hover {{
      border-color: var(--accent);
      background: var(--accent-dim);
    }}
    .slide-page[data-page-type="quiz"] .quiz-option.correct {{
      border-color: var(--success);
      background: rgba(78,205,196,0.08);
    }}
    .slide-page[data-page-type="quiz"] .quiz-option.wrong {{
      border-color: #ef4444;
      background: rgba(239,68,68,0.08);
    }}

    .slide-page[data-page-type="summary"] {{
      background: var(--bg);
      border-top: 3px solid var(--primary);
    }}
    .slide-page[data-page-type="summary"] li {{
      padding: 8px 0 8px 24px;
      position: relative;
    }}
    .slide-page[data-page-type="summary"] li::before {{
      content: '✓';
      position: absolute;
      left: 0;
      color: var(--primary);
      font-weight: 700;
    }}

    /* ══════════════════════════════════════════
       通用内容样式
       ══════════════════════════════════════════ */

    .slide-content {{
      max-width: 900px;
      width: 100%;
      position: relative;
      z-index: 1;
    }}

    h1 {{
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }}

    h2 {{
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--primary);
    }}

    h3 {{
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--primary);
    }}

    p {{
      font-size: 18px;
      margin-bottom: 16px;
      line-height: 1.9;
    }}

    ul, ol {{
      font-size: 18px;
      margin-bottom: 16px;
      padding-left: 28px;
    }}

    li {{
      margin-bottom: 8px;
    }}

    code {{
      font-family: var(--font-mono);
      background: #f3f4f6;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.88em;
    }}

    pre {{
      background: #1f2937;
      color: #e5e7eb;
      padding: 20px;
      border-radius: var(--radius);
      overflow-x: auto;
      margin-bottom: 20px;
      font-size: 14px;
      line-height: 1.6;
    }}

    pre code {{
      background: none;
      padding: 0;
    }}

    blockquote {{
      border-left: 4px solid var(--primary);
      padding: 12px 20px;
      margin: 16px 0;
      background: var(--primary-dim);
      border-radius: 0 var(--radius) var(--radius) 0;
      font-style: italic;
    }}

    svg {{
      max-width: 100%;
      height: auto;
    }}

    figure {{
      margin: 24px 0;
      text-align: center;
    }}

    figcaption {{
      font-size: 14px;
      color: var(--muted);
      margin-top: 8px;
    }}

    .quiz-option {{
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 20px;
      margin: 10px 0;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 16px;
    }}

    .quiz-option:hover {{
      border-color: var(--primary);
      background: var(--primary-dim);
    }}

    .quiz-option.correct {{
      border-color: #10b981;
      background: rgba(16, 185, 129, 0.08);
    }}

    .quiz-option.wrong {{
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.08);
    }}

    .objective-list {{
      list-style: none;
      padding: 0;
    }}

    .objective-list li {{
      padding: 12px 20px;
      margin: 8px 0;
      background: var(--primary-dim);
      border-radius: var(--radius);
      border-left: 3px solid var(--primary);
      font-size: 17px;
    }}

    .objective-list li::before {{
      content: '✦';
      margin-right: 12px;
      color: var(--primary);
    }}

    /* ══════════════════════════════════════════
       底部导航栏
       ══════════════════════════════════════════ */

    .nav-bar {{
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: var(--nav-height);
      background: #ffffff;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 0 24px;
      z-index: 100;
    }}

    .nav-btn {{
      width: 40px;
      height: 40px;
      border: none;
      background: #f3f4f6;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--fg);
      transition: all 0.2s ease;
    }}

    .nav-btn:hover {{
      background: var(--primary);
      color: #ffffff;
    }}

    .nav-btn:disabled {{
      opacity: 0.3;
      cursor: not-allowed;
    }}

    .nav-btn:disabled:hover {{
      background: #f3f4f6;
      color: var(--fg);
    }}

    .page-indicator {{
      font-size: 14px;
      color: var(--muted);
      min-width: 80px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }}

    .page-indicator .current {{
      font-weight: 600;
      color: var(--primary);
      font-size: 18px;
    }}

    .progress-bar {{
      position: absolute;
      top: 0;
      left: 0;
      height: 3px;
      background: var(--primary);
      transition: width 0.3s ease;
    }}

    /* ══════════════════════════════════════════
       侧边胶囊导航
       ══════════════════════════════════════════ */

    .sidebar-nav {{
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 50;
    }}

    .sidebar-dot {{
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d1d5db;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      padding: 0;
    }}

    .sidebar-dot.active {{
      background: var(--primary);
      width: 8px;
      height: 24px;
      border-radius: 4px;
    }}

    .sidebar-dot:hover {{
      background: var(--primary);
      opacity: 0.7;
    }}

    .keyboard-hint {{
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 12px;
      color: var(--muted);
      z-index: 50;
      opacity: 0;
      transition: opacity 0.3s ease;
    }}

    .presentation:hover .keyboard-hint {{
      opacity: 1;
    }}

    /* ══════════════════════════════════════════
       响应式
       ══════════════════════════════════════════ */

    @media (max-width: 768px) {{
      .slide-page {{
        padding: 40px 24px;
      }}
      h1 {{ font-size: 28px; }}
      h2 {{ font-size: 22px; }}
      p, ul, ol {{ font-size: 16px; }}
      .sidebar-nav {{ display: none; }}
      .keyboard-hint {{ display: none; }}
      .slide-page[data-page-type="cover"] h1 {{ font-size: 32px; }}
    }}

    @media print {{
      .nav-bar, .sidebar-nav, .keyboard-hint {{ display: none; }}
      .slide-page {{
        position: relative;
        opacity: 1;
        transform: none;
        pointer-events: auto;
        page-break-after: always;
        min-height: 100vh;
      }}
    }}
  </style>
</head>
<body>
  <div class="presentation" id="presentation">
    <div class="slides-container" id="slidesContainer">
      {content}
    </div>

    <div class="sidebar-nav" id="sidebarNav"></div>

    <div class="keyboard-hint">← → 翻页 · Space 播放</div>

    <nav class="nav-bar">
      <div class="progress-bar" id="progressBar"></div>
      <button class="nav-btn" id="btnPrev" title="上一页">◀</button>
      <div class="page-indicator">
        <span class="current" id="currentPage">1</span> / <span id="totalPages">1</span>
      </div>
      <button class="nav-btn" id="btnNext" title="下一页">▶</button>
      <button class="nav-btn" id="btnPlay" title="自动播放">⏵</button>
    </nav>
  </div>

  {scripts}

  <script>
  (function() {{
    const slides = document.querySelectorAll('.slide-page');
    const total = slides.length;
    let current = 0;
    let autoPlay = false;
    let autoPlayTimer = null;

    const btnPrev = document.getElementById('btnPrev');
    const btnNext = document.getElementById('btnNext');
    const btnPlay = document.getElementById('btnPlay');
    const currentPageEl = document.getElementById('currentPage');
    const totalPagesEl = document.getElementById('totalPages');
    const progressBar = document.getElementById('progressBar');
    const sidebarNav = document.getElementById('sidebarNav');

    totalPagesEl.textContent = total;

    slides.forEach((_, i) => {{
      const dot = document.createElement('button');
      dot.className = 'sidebar-dot';
      dot.title = '第 ' + (i + 1) + ' 页';
      dot.addEventListener('click', () => goTo(i));
      sidebarNav.appendChild(dot);
    }});

    function goTo(index) {{
      if (index < 0 || index >= total || index === current) return;

      const prev = current;
      const goingForward = index > prev;

      slides[prev].classList.remove('active');
      slides[prev].classList.add(goingForward ? 'exit-left' : 'exit-right');

      setTimeout(() => {{
        slides[prev].classList.remove('exit-left', 'exit-right');
      }}, 500);

      current = index;
      slides[current].classList.add('active');

      updateUI();
    }}

    function updateUI() {{
      currentPageEl.textContent = current + 1;
      btnPrev.disabled = current === 0;
      btnNext.disabled = current === total - 1;
      progressBar.style.width = ((current + 1) / total * 100) + '%';

      const dots = sidebarNav.querySelectorAll('.sidebar-dot');
      dots.forEach((dot, i) => {{
        dot.classList.toggle('active', i === current);
      }});

      slides.forEach((slide, i) => {{
        if (i !== current) {{
          slide.classList.remove('active', 'exit-left');
        }}
      }});
    }}

    btnPrev.addEventListener('click', () => goTo(current - 1));
    btnNext.addEventListener('click', () => goTo(current + 1));

    btnPlay.addEventListener('click', () => {{
      autoPlay = !autoPlay;
      btnPlay.textContent = autoPlay ? '⏸' : '⏵';
      if (autoPlay) {{
        autoPlayTimer = setInterval(() => {{
          if (current < total - 1) {{
            goTo(current + 1);
          }} else {{
            autoPlay = false;
            btnPlay.textContent = '⏵';
            clearInterval(autoPlayTimer);
          }}
        }}, 5000);
      }} else {{
        clearInterval(autoPlayTimer);
      }}
    }});

    document.addEventListener('keydown', (e) => {{
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {{
        e.preventDefault();
        goTo(current + 1);
      }} else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {{
        e.preventDefault();
        goTo(current - 1);
      }} else if (e.key === ' ') {{
        e.preventDefault();
        btnPlay.click();
      }} else if (e.key === 'Home') {{
        e.preventDefault();
        goTo(0);
      }} else if (e.key === 'End') {{
        e.preventDefault();
        goTo(total - 1);
      }}
    }});

    let touchStartX = 0;
    document.addEventListener('touchstart', (e) => {{ touchStartX = e.touches[0].clientX; }});
    document.addEventListener('touchend', (e) => {{
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) {{
        diff > 0 ? goTo(current + 1) : goTo(current - 1);
      }}
    }});

    if (slides.length > 0) {{
      slides[0].classList.add('active');
    }}
    updateUI();
  }})();
  </script>
</body>
</html>
