<!--
  本质工坊 · 内容区块模板 v2
  每种页型一个HTML片段，用于填充 course-skeleton-v2.html 的 {{content}} 占位符
  每个 <section> 必须有 data-page-index 和 data-page-type 属性
-->

<!-- ══════════════════════════════════════════ -->
<!-- cover: 封面页 -->
<!-- ══════════════════════════════════════════ -->
<template id="tpl-cover">
<section class="slide-page" data-page-index="{index}" data-page-type="cover">
  <div class="cover-decoration"></div>
  <div class="cover-decoration-2"></div>
  <div class="slide-content">
    <h1>{heading}</h1>
    <p class="subtitle">{subtitle}</p>
  </div>
</section>
</template>

<!-- ══════════════════════════════════════════ -->
<!-- objectives: 学习目标页 -->
<!-- ══════════════════════════════════════════ -->
<template id="tpl-objectives">
<section class="slide-page" data-page-index="{index}" data-page-type="objectives">
  <div class="slide-content">
    <h2>{heading}</h2>
    <ul class="objective-list">
      {items}
    </ul>
  </div>
</section>
</template>

<!-- ══════════════════════════════════════════ -->
<!-- concept: 核心概念页 -->
<!-- ══════════════════════════════════════════ -->
<template id="tpl-concept">
<section class="slide-page" data-page-index="{index}" data-page-type="concept">
  <div class="slide-content">
    <h2>{heading}</h2>
    {body}
  </div>
</section>
</template>

<!-- ══════════════════════════════════════════ -->
<!-- concept-keypoint: 带重点框的概念页 -->
<!-- ══════════════════════════════════════════ -->
<template id="tpl-concept-keypoint">
<section class="slide-page" data-page-index="{index}" data-page-type="concept">
  <div class="slide-content">
    <h2>{heading}</h2>
    {body}
    <div class="key-point">
      <div class="key-point-title">核心要点</div>
      <p>{keypoint}</p>
    </div>
  </div>
</section>
</template>

<!-- ══════════════════════════════════════════ -->
<!-- interactive: 互动探究页 -->
<!-- ══════════════════════════════════════════ -->
<template id="tpl-interactive">
<section class="slide-page" data-page-index="{index}" data-page-type="interactive">
  <div class="slide-content">
    <h2>{heading}</h2>
    {body}
  </div>
</section>
</template>

<!-- ══════════════════════════════════════════ -->
<!-- quiz: 测验页 -->
<!-- ══════════════════════════════════════════ -->
<template id="tpl-quiz">
<section class="slide-page" data-page-index="{index}" data-page-type="quiz">
  <div class="slide-content">
    <h2>{heading}</h2>
    <p>{question}</p>
    <div class="quiz-options">
      {options}
    </div>
  </div>
</section>
</template>

<!-- ══════════════════════════════════════════ -->
<!-- summary: 总结页 -->
<!-- ══════════════════════════════════════════ -->
<template id="tpl-summary">
<section class="slide-page" data-page-index="{index}" data-page-type="summary">
  <div class="slide-content">
    <h2>{heading}</h2>
    {body}
  </div>
</section>
</template>
